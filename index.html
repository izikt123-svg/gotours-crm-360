        +'<span class="quote-status-chip '+(filterSt==="all"?"active":"")+'" onclick="S.quoteFilterStatus=\'all\';render()">הכל</span>'
        +QUOTE_STATUSES.map(function(st){return '<span class="quote-status-chip '+(filterSt===st?"active":"")+'" onclick="S.quoteFilterStatus=\''+st+'\';render()">'+st+'</span>';}).join("")
        +'</div>'
        +'<div class="list">'+(list.length===0?'<div class="empty">אין הצעות מחיר'+(filterSt!=="all"?' בסטטוס '+filterSt:'')+'</div>'
        :list.map(function(qt){
          var t=quoteTotal(qt.items);
          var at=addonsTotal(qt.addons||[]);
          var gt=t+at;
          var stBadge=qt.status==="נחתמה"?"qb-signed":qt.status==="נשלחה"?"qb-sent":qt.status==="בוטלה"?"qb-expired":"qb-draft";
          return '<div class="item">'
            +'<div class="item-head"><strong>'+escapeHtml(qt.tripTitle)+'</strong><span class="quote-badge '+stBadge+'">'+escapeHtml(qt.status)+'</span></div>'
            +'<div class="small">👤 '+escapeHtml(qt.clientName)+' | 💰 '+sym+gt.toLocaleString("he-IL")+(qt.destination?' | ✈ '+escapeHtml(qt.destination):'')+(qt.itinerary&&qt.itinerary.length?' | 🗓 '+qt.itinerary.length+' ימים':'')+(qt.addons&&qt.addons.length?' | ⭐ '+qt.addons.length+' שדרוגים':'')+'</div>'
            +'<div class="small muted">נוצרה: '+fmtDateShort(qt.createdAt)+(qt.sentAt?' | נשלחה: '+fmtDateShort(qt.sentAt):'')+(qt.signedAt?' | נחתמה: '+fmtDateShort(qt.signedAt):'')+'</div>'
            +'<div class="row" style="margin-top:6px;gap:4px">'
            +'<button class="btn-primary" style="width:auto;font-size:12px" onclick="viewQuote('+qt.id+')">👁 צפה</button>'
            +'<button class="btn-soft" style="width:auto;font-size:12px" onclick="editQuote('+qt.id+')">✏️</button>'
            +'<button class="btn-wa" style="width:auto;font-size:12px" onclick="sendQuoteViaWhatsApp('+qt.id+')">📲</button>'
            +'<button class="btn-primary" style="width:auto;font-size:12px" onclick="sendQuoteViaEmail('+qt.id+')">📧</button>'
            +(qt.signature?'<button class="btn-purple" style="width:auto;font-size:12px" onclick="generateQuotePDF('+qt.id+')">📄 PDF</button>':'')
            +'<button class="btn-danger" style="width:auto;font-size:12px" onclick="deleteQuote('+qt.id+')">🗑</button>'
            +'</div></div>';
        }).join(""))+'</div></div>';

      return '<div class="quote-layout">'+formHtml+listHtml+'</div>';
    }

    function saveFinance() {
      const f=S.financeForm; if(!f.travelerName||!f.amount) return;
      if(f.id) { const i=S.finances.findIndex(x=>x.id===f.id); if(i>=0) S.finances[i]={...f}; }
      else { S.finances.push({...f,id:uid()}); }
      setState({financeForm:structuredClone(seed.financeForm)});
    }
    function editFinance(id) { const f=S.finances.find(x=>x.id===id); if(f) setState({financeForm:{...f}},false); }
    function deleteFinance(id) { setState({finances:S.finances.filter(x=>x.id!==id)}); }

    function renderFinancesTab() {
      const q=(S.search||"").trim().toLowerCase();
      const list=q?S.finances.filter(f=>(f.travelerName||"").toLowerCase().includes(q)||(f.description||"").toLowerCase().includes(q)||(f.invoiceNumber||"").toLowerCase().includes(q)):S.finances;
      const totalPaid=S.finances.filter(f=>f.status==="שולם").reduce((s,f)=>s+(Number(f.amount)||0),0);
      const totalPending=S.finances.filter(f=>f.status==="ממתין"||f.status==="באיחור").reduce((s,f)=>s+(Number(f.amount)||0),0);
      const f=S.financeForm;
      return '<div class="layout-2">'
        + '<div class="card"><div class="section-title">💳 '+(f.id?"עריכת":"הוספת")+' רשומה כספית</div>'
        + '<div class="grid">'
        + '<div class="row"><div>'+tip("סוג","סוג הרשומה הכספית – חשבונית, קבלה, זיכוי או הצעת מחיר")+'<select value="'+escapeHtml(f.type)+'" onchange="S.financeForm.type=this.value;render()">'+FINANCE_TYPES.map(t=>'<option'+(t===f.type?' selected':'')+'>'+t+'</option>').join('')+'</select></div>'
        + '<div>'+tip("שם לקוח","שם המטייל או הלקוח שהרשומה שייכת אליו")+'<input value="'+escapeHtml(f.travelerName)+'" oninput="S.financeForm.travelerName=this.value"></div></div>'
        + '<div>'+tip("תיאור","תיאור קצר של הרשומה – למשל: טיול איטליה תשלום ראשון")+'<input value="'+escapeHtml(f.description)+'" oninput="S.financeForm.description=this.value"></div>'
        + '<div class="row"><div>'+tip("סכום","סכום הרשומה במספרים")+'<input type="number" value="'+escapeHtml(f.amount)+'" oninput="S.financeForm.amount=this.value"></div>'
        + '<div>'+tip("מטבע","מטבע הרשומה – שקלים, דולר, אירו וכו׳")+'<select onchange="S.financeForm.currency=this.value">'+["ILS","USD","EUR","GBP"].map(c=>'<option'+(c===f.currency?' selected':'')+'>'+c+'</option>').join('')+'</select></div></div>'
        + '<div class="row"><div>'+tip("סטטוס","סטטוס התשלום – ממתין, שולם, באיחור, בוטל")+'<select onchange="S.financeForm.status=this.value">'+FINANCE_STATUSES.map(s=>'<option'+(s===f.status?' selected':'')+'>'+s+'</option>').join('')+'</select></div>'
        + '<div>'+tip("אמצעי תשלום","אמצעי תשלום – כרטיס אשראי, העברה, מזומן וכו׳")+'<select onchange="S.financeForm.method=this.value">'+PAYMENT_METHODS.map(m=>'<option'+(m===f.method?' selected':'')+'>'+m+'</option>').join('')+'</select></div></div>'
        + '<div class="row"><div>'+tip("תאריך יעד","תאריך יעד לתשלום")+'<input type="date" value="'+escapeHtml(f.dueDate)+'" oninput="S.financeForm.dueDate=this.value"></div>'
        + '<div>'+tip("תאריך תשלום","תאריך בו בוצע התשלום בפועל")+'<input type="date" value="'+escapeHtml(f.paidDate)+'" oninput="S.financeForm.paidDate=this.value"></div></div>'
        + '<div>'+tip("מספר חשבונית","מספר חשבונית/קבלה לזיהוי ומעקב")+'<input value="'+escapeHtml(f.invoiceNumber)+'" oninput="S.financeForm.invoiceNumber=this.value"></div>'
        + '<div>'+tip("הערות","הערות נוספות לרשומה הכספית")+'<textarea oninput="S.financeForm.notes=this.value">'+escapeHtml(f.notes)+'</textarea></div>'

        + '</div></div>'
        // סיכום כספי
        + '<div class="card"><div class="section-title">💰 סיכום כספי</div>'
        + '<div class="kpis" style="grid-template-columns:repeat(3,1fr);margin-bottom:12px">'

        + '<div class="kpi"><div class="small muted">ממתין לגבייה</div><strong style="color:var(--warn)">₪'+totalPending.toLocaleString("he-IL")+'</strong></div>'
        + '<div class="kpi"><div class="small muted">סה"כ רשומות</div><strong>'+S.finances.length+'</strong></div>'
        + '</div>'
        + '<div class="list">'+list.map(fi=>'<div class="item '+(fi.status==="באיחור"?"priority-high":fi.status==="ממתין"?"priority":"")+'">'
          + '<div class="item-head"><strong>'+escapeHtml(fi.travelerName)+'</strong><span class="badge '+(fi.status==="שולם"?"b-ok":fi.status==="באיחור"?"b-danger":"b-warn")+'">'+escapeHtml(fi.status)+'</span></div>'

          + '</div></div>').join('')
        + '</div></div></div>';
    }

    // ===== DUPLICATE REMOVAL =====
    function scanDuplicates() {
      const scope = S.duplicateScope || "all";
      const phoneMap = {};
      const addToMap = (type, items) => {
        items.forEach(item => {
          const phone = normalizePhone(item.phone);
          if(!phone) return;
          if(!phoneMap[phone]) phoneMap[phone] = [];
          phoneMap[phone].push({type, id:item.id, name:item.fullName||item.name||"", phone:item.phone, email:item.email||""});
        });
      };
      if(scope==="all"||scope==="travelers") addToMap("מטייל", S.travelers);
      if(scope==="all"||scope==="contacts") addToMap("איש קשר", S.contacts);
      if(scope==="all"||scope==="leads") addToMap("ליד", S.leads);
      const dupes = Object.entries(phoneMap).filter(([k,v])=>v.length>1).map(([phone,entries])=>({phone,entries}));
      logActivity("סריקת כפילויות", "נמצאו "+dupes.length+" מספרי טלפון כפולים");
      setState({duplicateResults:dupes, duplicateScanning:false});
    }
    function removeDuplicateEntry(phone, type, id) {
      if(type==="מטייל") S.travelers=S.travelers.filter(x=>x.id!==id);
      else if(type==="איש קשר") S.contacts=S.contacts.filter(x=>x.id!==id);
      else if(type==="ליד") S.leads=S.leads.filter(x=>x.id!==id);
      logActivity("הסרת כפילות", type+" - טלפון: "+phone);
      scanDuplicates();
    }
    function removeAllDuplicates() {
      if(!confirm("האם להסיר את כל הכפילויות? לכל מספר כפול ישמר רק הרשומה הראשונה.")) return;
      let removed = 0;
      S.duplicateResults.forEach(dup => {
        dup.entries.slice(1).forEach(entry => {
          if(entry.type==="מטייל") S.travelers=S.travelers.filter(x=>x.id!==entry.id);
          else if(entry.type==="איש קשר") S.contacts=S.contacts.filter(x=>x.id!==entry.id);
          else if(entry.type==="ליד") S.leads=S.leads.filter(x=>x.id!==entry.id);
          removed++;
        });
      });
      logActivity("הסרת כל הכפילויות", "הוסרו "+removed+" רשומות כפולות");
      scanDuplicates();
    }

    // ===== TRIP TRAVELER EXTENDED DATA =====
    const ROOM_TYPES = ["חדר יחיד","חדר זוגי","אחר"];
    const DIETARY_OPTIONS = ["ללא הגבלה","צמחוני","טבעוני","כשר","ללא גלוטן"];
    const PAYMENT_STATUSES = ["שילם מקדמה","שילם במלואו","יתרת חובה"];

    function getTripTravelerData(tripId, travelerId) {
      const trip = S.trips.find(t=>t.id==tripId);
      if (!trip || !trip.travelersData) return null;
      return trip.travelersData[travelerId] || null;
    }
    function ensureTripTravelerData(tripId, travelerId) {
      const ti = S.trips.findIndex(t=>t.id==tripId);
      if (ti<0) return;
      if (!S.trips[ti].travelersData) S.trips[ti].travelersData = {};
      if (!S.trips[ti].travelersData[travelerId]) {
        S.trips[ti].travelersData[travelerId] = {
          roomType:"", passportNumber:"", passportExpiry:"",
          hasInsurance:"", medicalCondition:"", allergies:"",
          dietaryPreference:"ללא הגבלה", emergencyContactName:"",
          emergencyContactPhone:"", paymentStatus:"יתרת חובה", paymentNotes:""
        };
      }
      return S.trips[ti].travelersData[travelerId];
    }
    function updateTripTravelerField(tripId, travelerId, field, value) {
      ensureTripTravelerData(tripId, travelerId);
      const ti = S.trips.findIndex(t=>t.id==tripId);
      if (ti<0) return;
      S.trips[ti].travelersData[travelerId][field] = value;
      setState({trips:S.trips});
    }
    function importTravelerToTrip(travelerId, tripId) {
      const ti = S.travelers.findIndex(t=>t.id==travelerId);
      if (ti<0) return;
      S.travelers[ti].currentTripId = tripId;
      ensureTripTravelerData(tripId, travelerId);
      logActivity("ייבוא מטייל לתיק", S.travelers[ti].fullName);
      setState({travelers:S.travelers, trips:S.trips});
    }
    function importContactAsTravelerToTrip(contactId, tripId) {
      // Find contact in contacts, leads, or hrManagers
      let source = S.contacts.find(c=>c.id==contactId);
      let srcType = "contact";
      if (!source) { source = S.leads.find(l=>l.id==contactId); srcType = "lead"; }
      if (!source) return;
      // Check if already exists as traveler by phone
      const phone = normalizePhone(source.phone);
      let traveler = phone ? S.travelers.find(t=>normalizePhone(t.phone)===phone) : null;
      if (!traveler) {
        // Create new traveler from contact/lead
        traveler = {
          ...structuredClone(seed.travelerForm),
          id: uid(),
          fullName: source.fullName || "",
          phone: source.phone || "",
          whatsapp: source.phone || "",
          email: source.email || "",
          city: source.city || "",
          currentTripId: tripId,
          conversationHistory: [],
          active: true
        };
        S.travelers.unshift(traveler);
        logActivity("ייבוא "+srcType+" כמטייל לתיק", traveler.fullName);
      } else {
        traveler.currentTripId = tripId;
        logActivity("שיוך מטייל קיים לתיק", traveler.fullName);
      }
      ensureTripTravelerData(tripId, traveler.id);
      setState({travelers:S.travelers, trips:S.trips});
    }
    function searchCRMForImport(query) {
      if (!query || query.length < 2) return [];
      const q = query.toLowerCase();
      const results = [];
      // Search travelers
      S.travelers.forEach(t => {
        if ((t.fullName||"").toLowerCase().includes(q) || normalizePhone(t.phone).includes(q.replace(/\D/g,"")))
          results.push({id:t.id, name:t.fullName, phone:t.phone, email:t.email, type:"traveler", assigned:!!t.currentTripId});
      });
      // Search contacts
      S.contacts.forEach(c => {
        if ((c.fullName||"").toLowerCase().includes(q) || normalizePhone(c.phone).includes(q.replace(/\D/g,"")))
          results.push({id:c.id, name:c.fullName, phone:c.phone, email:c.email, type:"contact"});
      });
      // Search leads
      S.leads.forEach(l => {
        if ((l.fullName||"").toLowerCase().includes(q) || normalizePhone(l.phone).includes(q.replace(/\D/g,"")))
          results.push({id:l.id, name:l.fullName, phone:l.phone, email:l.email, type:"lead"});
      });
      return results.slice(0, 15);
    }
    function doTripImportSearch(tripId) {
      const q = S.tripImportSearch || "";
      const results = searchCRMForImport(q);
      const container = document.getElementById("tripImportResults");
      if (!container) return;
      if (!q || q.length < 2) { container.innerHTML = ""; return; }
      if (!results.length) { container.innerHTML = '<div class="small muted" style="padding:8px">לא נמצאו תוצאות</div>'; return; }
      container.innerHTML = results.map(r => {
        const typeLabel = r.type==="traveler"?"👥 מטייל":r.type==="contact"?"👔 איש קשר":"🎯 ליד";
        const isAssigned = r.type==="traveler" && r.assigned;
        return '<div class="autocomplete-item" onclick="'
          + (r.type==="traveler" ? 'importTravelerToTrip('+r.id+','+tripId+')' : 'importContactAsTravelerToTrip('+r.id+','+tripId+')')
          + ';S.tripImportSearch=String();doTripImportSearch('+tripId+')">'

          + (isAssigned?' <span class="chip" style="font-size:10px;background:#fff2dd">משויך לטיול</span>':'')+'</div>'

    function tripGroupWhatsApp(tripId) {
      const travelers = S.travelers.filter(t=>t.currentTripId==tripId);
      const phones = travelers.map(t=>phoneForWa(t.whatsapp||t.phone)).filter(Boolean);
      if (!phones.length) return alert("אין מטיילים עם מספר טלפון בתיק זה");
      // WhatsApp doesn't support true group messaging via URL, open individual chats
      // Best approach: copy all numbers for group creation
      const trip = tripById(tripId);
      const msg = encodeURIComponent("שלום! הודעה מ-GoTours בנוגע לטיול: " + (trip?trip.title:""));
      // Open WhatsApp with first number and message, show all numbers
      const allNumbers = phones.join(", ");
      if (confirm("מספרי הטלפון של כל המטיילים:\n" + allNumbers + "\n\nלפתוח וואטסאפ עם ההודעה?")) {
        phones.forEach((p,i) => {
          if (i === 0) window.open("https://wa.me/"+p+"?text="+msg, "_blank");
        });
        // Copy all numbers to clipboard
        try { navigator.clipboard.writeText(allNumbers); } catch(_) {}
      }
    }
    function tripGroupEmail(tripId) {
      const travelers = S.travelers.filter(t=>t.currentTripId==tripId);
      const emails = travelers.map(t=>t.email).filter(Boolean);
      if (!emails.length) return alert("אין מטיילים עם כתובת אימייל בתיק זה");
      const trip = tripById(tripId);
      const subject = encodeURIComponent("הודעה מ-GoTours – " + (trip?trip.title:""));
      const bcc = emails.join(",");
      window.location.href = "mailto:?bcc=" + bcc + "&subject=" + subject;
    }

        {id:"activityLog",label:"📋 יומן פעילויות"},
        {id:"settings",label:"⚙ הגדרות"},
        {id:"guide",label:"📖 מדריך הפעלה"},
        {id:"upgrades",label:"🚀 שדרוגים"}
      ];
      // Filter tabs based on role
      const tabs = allTabs.filter(t => isTabAllowed(t.id));
      // If current tab is not allowed, redirect to dashboard
      if (!isTabAllowed(S.tab)) { S.tab = "dashboard"; }
      let content="";
      if(S.tab==="dashboard") content=renderDashboard();
      else if(S.tab==="leads") content=renderLeadsTab();
      else if(S.tab==="travelers") content=renderTravelersTab();
      else if(S.tab==="contacts") content=renderContactsTab();
      else if(S.tab==="trips") content=renderTripsTab();
      else if(S.tab==="agencies") content=renderAgenciesTab();
      else if(S.tab==="suppliers") content=renderSuppliersTab();
      else if(S.tab==="hr") content=renderHrTab();
      else if(S.tab==="matching") content=renderMatchingTab();
      else if(S.tab==="conversations") content=renderConversationsTab();
      else if(S.tab==="broadcast") content=renderBroadcastTab();
      else if(S.tab==="birthdays") content=renderBirthdaysTab();
      else if(S.tab==="alerts") content=renderAlertsTab();
      else if(S.tab==="reports") content=renderReportsTab();
      else if(S.tab==="weather") content=renderWeatherTab();
      else if(S.tab==="maps") content=renderMapsTab();
      else if(S.tab==="integrations") content=renderIntegrationsTab();
      else if(S.tab==="imports") content=renderImportsTab();
      else if(S.tab==="calendar") content=renderCalendarTab();
      else if(S.tab==="finances") content=renderFinancesTab();
      else if(S.tab==="quotes") content=renderQuotesTab();
      else if(S.tab==="hiking") content=renderHikingTab();
      else if(S.tab==="social") content=renderSocialTab();
      else if(S.tab==="guidesManage") content=renderGuidesManageTab();
      else if(S.tab==="duplicates") content=renderDuplicatesTab();
      else if(S.tab==="activityLog") content=renderActivityLogTab();
      else if(S.tab==="settings") content=renderSettingsTab();
      else if(S.tab==="guide") content=renderGuideTab();
      else if(S.tab==="upgrades") content=renderUpgradesTab();
      else content=renderDashboard();

      const d=dashboardData();
      const onlineUsersHtml = function(){var ou=getOnlineUsers();var us=loadUsers();return ou.length?ou.map(function(u){var usr=us.find(function(x){return x.username===u;});return '<span class="meta-pill" style="background:rgba(31,200,100,0.3);border-color:rgba(31,200,100,0.5)">🟢 '+escapeHtml(u)+(usr?' ('+escapeHtml(usr.role)+')':'')+'</span>';}).join(''):'<span class="meta-pill" style="opacity:0.5">אין מחוברים</span>';}();
      const isCeo = S.currentUserRole==="מנכ\"ל";
      const revenuePill = isCeo ? '<span class="meta-pill">💰 ₪'+d.revenue.toLocaleString("he-IL")+'</span>' : '';
      const greetingText = getTimeGreeting() + ', ' + escapeHtml(S.currentUser) + '!';
      return '<div class="shell">'
        + '<div class="header"><div style="text-align:right;padding:8px 4px 4px"><div id="hero_clock" style="font-size:20px;font-weight:800;letter-spacing:0.5px;direction:rtl">'+escapeHtml(greetingText)+' | '+new Date().toLocaleDateString("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"})+" | "+new Date().toLocaleTimeString("he-IL")+'</div></div><div class="header-row"><div><h2 style="text-align:right">✈ GoTours CRM 360</h2><div style="text-align:right">מרכז שליטה מאוחד | tiyoolim.com · GoTours · שטח הפקות</div><div id="sync_meta" class="small" style="margin-top:5px"></div><div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px"><span class="small" style="color:#fff;opacity:0.8">👥 מחוברים כרגע:</span>'+onlineUsersHtml+'</div><div class="top-meta"><span class="meta-pill">👤 '+escapeHtml(S.currentUser)+' ('+escapeHtml(S.currentUserRole)+')</span><span class="meta-pill">'+ (_offlineMode?'📴 לא מקוון':'☁️ מחובר') +'</span><span class="meta-pill">🔔 '+(d.overdueTasks+d.birthdaysToday)+' התראות</span><span class="meta-pill">🎯 '+d.leads+' לידים</span><span class="meta-pill">👥 '+d.travelers+' מטיילים</span>'+revenuePill+'</div></div><div class="row" style="max-width:620px"><input placeholder="🔍 חיפוש מטייל, ספק, הזמנה..." value="'+escapeHtml(S.search||"")+'" oninput="setState({search:this.value},false)"></div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><div class="call-sim-input"><input placeholder="📞 מספר מתקשר..." value="'+escapeHtml(S.incomingCallNumber||"")+'" oninput="S.incomingCallNumber=this.value" onkeydown="if(event.key===\'Enter\')simulateIncomingCall(\'972542233888\')" style="width:160px;font-size:12px"></div><button class="btn-ok" style="width:auto;padding:6px 10px;font-size:11px" onclick="simulateIncomingCall(\'972542233888\')" title="972542233888">📞 נייד</button><button class="btn-primary" style="width:auto;padding:6px 10px;font-size:11px" onclick="simulateIncomingCall(\'97236564488\')" title="97236564488">📞 קווי</button></div><div class="row" style="max-width:130px"><button class="btn-soft" onclick="logout()">יציאה</button></div></div></div>'
        + '<div class="main-layout">'
        + '<div class="main-content">' + content + '</div>'
        + '<nav class="sidebar-nav" id="sidebarNav">'
        + '<div style="padding:4px 8px 10px;font-size:12px;font-weight:800;color:var(--muted);border-bottom:1px solid var(--line);margin-bottom:6px">📌 תפריט ניווט</div>'
        + tabs.map(t=>'<button class="'+(S.tab===t.id?"active":"")+'" onclick="setState({tab:\''+t.id+'\'},false);closeSidebar()">'+t.label+'</button>').join("")
        + '</nav>'
        + '</div>'
        + '<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>'
        + '<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>'
        + renderAiWidget()
        + renderNatalyWidget()
        + renderIncomingCallOverlay()
        + '</div>';
    }

    // ===== RENDER INCOMING CALL OVERLAY =====
    function renderIncomingCallOverlay() {
      if(!S.incomingCallOpen) return "";
      const m = S.incomingCallMatch;
      const avatar = m ? (m.data.fullName||m.data.name||"?").charAt(0) : "?";
      const name = m ? escapeHtml(m.data.fullName||m.data.name||"לא ידוע") : "מספר לא מוכר";
      const typeLabel = m ? (m.type==="traveler"?"מטייל":m.type==="contact"?"איש קשר":m.type==="lead"?"ליד":m.type==="supplier"?"ספק":m.type==="hr"?"כח אדם":"") : "";
      const receivedAtPhone = S.incomingCallReceivedAt || GOTOURS_PHONE;
      let cardInfo = "";
      if(m) {
        const d = m.data;
        cardInfo = '<div class="call-card-info"><h4>'+escapeHtml(typeLabel)+': '+name+'</h4>'
          + (d.phone?'<div class="small">📞 '+escapeHtml(d.phone)+'</div>':"")
          + (d.email?'<div class="small">📧 '+escapeHtml(d.email)+'</div>':"")
          + (d.city?'<div class="small">📍 '+escapeHtml(d.city)+'</div>':"")
          + (d.company?'<div class="small">🏢 '+escapeHtml(d.company)+'</div>':"")
          + (d.organization?'<div class="small">🏢 '+escapeHtml(d.organization)+'</div>':"")
          + (d.preferredCategory?'<div class="small">✈ קטגוריה: '+escapeHtml(d.preferredCategory)+'</div>':"")
          + (d.walkingLevel?'<div class="small">🥾 רמת הליכה: '+escapeHtml(d.walkingLevel)+'</div>':"")
          + (d.budgetMax?'<div class="small">💰 תקציב: עד ₪'+escapeHtml(String(d.budgetMax))+'</div>':"")
          + (d.destinationInterest?'<div class="small">🎯 יעד: '+escapeHtml(d.destinationInterest)+'</div>':"")
          + (d.notes?'<div class="small" style="margin-top:4px;color:var(--muted)">📝 '+escapeHtml(d.notes)+'</div>':"")
          + (d.lastConversation?'<div class="small" style="margin-top:4px">💬 שיחה אחרונה: '+escapeHtml(d.lastConversation.channel||"")+" – "+escapeHtml(fmtDateShort(d.lastConversation.at))+'</div>':"")
          + '</div>';
      }
      return '<div class="call-overlay" onclick="if(event.target===this)dismissIncomingCall()">'
        + '<div class="call-panel">'
        + '<div class="call-header"><div class="call-avatar">'+escapeHtml(avatar)+'</div><div><h3>📞 שיחה נכנסת למספר '+escapeHtml(receivedAtPhone)+'</h3><div class="small muted">מתקשר: '+escapeHtml(String(S.incomingCallNumber||""))+'</div>'+(m?'<div class="small" style="color:var(--ok);font-weight:700">✅ נמצאה כרטיסיה – '+escapeHtml(typeLabel)+'</div>':'<div class="small" style="color:var(--warn);font-weight:700">⚠ לא נמצאה כרטיסיה במערכת – יירשם כליד חדש</div>')+'</div></div>'
        + '<div class="call-recording"><div class="call-rec-dot"></div><strong style="color:#c62828">● מקליט שיחה</strong><span class="small muted">השיחה מוקלטת ותישמר בכרטיסיית המתקשר</span></div>'
        + cardInfo
        + '<div style="margin-bottom:12px"><label style="font-weight:700;color:var(--brand)">📝 רישום ידני – תיעוד השיחה</label><textarea placeholder="רשום כאן סיכום השיחה, בקשות, הערות..." oninput="S.incomingCallNote=this.value" style="min-height:100px">'+escapeHtml(S.incomingCallNote||"")+'</textarea></div>'
        + (!m?'<div style="margin-bottom:12px;padding:10px;background:#fffbf0;border:1px solid #ffd54f;border-radius:10px"><div class="small"><strong>💡 שיחה ממספר לא מוכר:</strong> בסיום השיחה המתקשר יירשם אוטומטית כליד חדש. ניתן גם ליצור ליד עכשיו:</div><button class="btn-warn" style="margin-top:6px;font-size:13px" onclick="createLeadFromCall()">➕ צור ליד חדש עכשיו</button></div>':"")
        + '<div class="row" style="gap:8px"><button class="btn-ok" onclick="endIncomingCall()">✅ סיום שיחה ושמירה</button><button class="btn-danger" onclick="dismissIncomingCall()">❌ ביטול</button>'+(m&&m.type==="traveler"?'<button class="btn-primary" onclick="dismissIncomingCall();editTraveler('+m.data.id+');setState({tab:\'travelers\'},false)">✏️ פתח כרטיסיה</button>':'')+(m&&m.type==="lead"?'<button class="btn-primary" onclick="dismissIncomingCall();editLead('+m.data.id+');setState({tab:\'leads\'},false)">✏️ פתח ליד</button>':'')+(m&&m.type==="supplier"?'<button class="btn-primary" onclick="dismissIncomingCall();editSupplier('+m.data.id+');setState({tab:\'suppliers\'},false)">✏️ פתח ספק</button>':'')+(m&&m.type==="hr"?'<button class="btn-primary" onclick="dismissIncomingCall();editHrManager('+m.data.id+');setState({tab:\'hr\'},false)">✏️ פתח כח אדם</button>':'')+'</div>'
        + (S.callLog.length?'<div style="margin-top:16px;border-top:1px dashed var(--line);padding-top:12px"><div class="section-title" style="font-size:15px">📞 יומן שיחות אחרונות</div><div class="list">'+S.callLog.slice(0,5).map(c=>'<div class="item"><div class="item-head"><strong>'+escapeHtml(c.matchName)+'</strong><span class="badge b-ok">'+escapeHtml(c.matchType==="traveler"?"מטייל":c.matchType==="contact"?"איש קשר":c.matchType==="lead"?"ליד":c.matchType==="supplier"?"ספק":c.matchType==="hr"?"כח אדם":"לא מוכר")+'</span></div><div class="small">📞 '+escapeHtml(c.phone)+' | '+escapeHtml(fmtDateShort(c.at))+(c.receivedAt?' | למספר: '+escapeHtml(c.receivedAt):'')+(c.recorded?' | 🔴 הוקלט':'')+'</div>'+(c.note?'<div class="small muted">📝 '+escapeHtml(c.note)+'</div>':'')+'</div>').join("")+'</div></div>':"")
        + '</div></div>';
    }

    // ===== SIDEBAR TOGGLE (MOBILE) =====
    function toggleSidebar() {
      var nav=document.getElementById("sidebarNav");
      var ov=document.getElementById("sidebarOverlay");
      if(nav&&ov){ nav.classList.toggle("open"); ov.classList.toggle("open"); }
    }
    function closeSidebar() {
      var nav=document.getElementById("sidebarNav");
      var ov=document.getElementById("sidebarOverlay");
      if(nav) nav.classList.remove("open");
      if(ov) ov.classList.remove("open");
    }

    function render() {
      const app=document.getElementById("app");
      if(S.loading){app.innerHTML='<div class="auth-wrap"><div class="card auth"><h1>✈ GoTours CRM 360</h1><div class="muted">טוען נתונים...</div></div></div>'; return;}
      app.innerHTML=S.isAuthenticated?renderMain():renderAuth();
      renderSyncMeta();
      // Scroll active sidebar item into view
      var activeBtn=document.querySelector(".sidebar-nav button.active");
      if(activeBtn) activeBtn.scrollIntoView({block:"nearest",behavior:"smooth"});
    }

    // ===== INIT =====
    loadFallback();
    normalizeStateShape();
    // Auto-restore session (Stay Logged In)
    (function restoreSession() {
      const sess = loadSession();
      if (sess) {
        const users = loadUsers();
        const found = users.find(x => x.username === sess.username);
        if (found) {
          S.isAuthenticated = true;
          S.currentUser = found.username;
          S.currentUserRole = found.role;
          markOnline(found.username);
          logActivity("חיבור אוטומטי", found.username + " (" + found.role + ")");
        }
      }
    })();
    render();
    loadRemote();
    refreshIntegrationsStatus();
    refreshBirthdayAutomationStatus();

    // ===== AUTO-SAVE: global listener for all input changes =====
    document.addEventListener("input", function(e) {
      const tag = e.target.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") {
        autoSave();
      }
    });
    document.addEventListener("change", function(e) {
      const tag = e.target.tagName;
      if (tag === "INPUT" || tag === "SELECT") {
        autoSave();
      }
    });

    // ===== LIVE CLOCK =====
    function updateHeroClock() {
      const el = document.getElementById("hero_clock");
      if (!el) return;
      const now = new Date();
      const greeting = S.isAuthenticated ? getTimeGreeting() + ', ' + S.currentUser + '! | ' : '';
      el.textContent = greeting + now.toLocaleDateString("he-IL", {weekday:"long",year:"numeric",month:"long",day:"numeric"}) + " | " + now.toLocaleTimeString("he-IL");
    }
    setInterval(updateHeroClock, 1000);
  </script>
</body>
</html>
