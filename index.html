<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoTours CRM 360 – מהדורה מקצועית</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fa; --card: #ffffff; --line: #d7e1eb; --text: #132133;
      --muted: #5e6f84; --brand: #0f567f; --brand-2: #1f89aa;
      --ok: #1f8a53; --warn: #b57814; --danger: #c33434;
      --chip: #edf5fc; --shadow: 0 12px 30px rgba(11,39,64,0.09); --nataly: #25d366;
    }
    * { box-sizing: border-box; }
    body { margin:0; padding:16px; min-height:100vh; color:var(--text); font-family:"Assistant","Segoe UI",Arial,sans-serif; background:radial-gradient(circle at top right,#e7f4ff 0%,#f5f8fc 45%,#eff3f8 100%); }
    .auth-wrap { min-height:calc(100vh - 32px); display:grid; place-items:center; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:14px; }
    .auth { width:min(460px,100%); padding:22px; }
    h1,h2,h3,h4 { margin:0; }
    h1 { color:var(--brand); font-size:30px; margin-bottom:8px; }
    .muted { color:var(--muted); }
    .grid { display:grid; gap:10px; }
    label { font-size:13px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px; }
    input,select,textarea,button { width:100%; font:inherit; border-radius:10px; border:1px solid var(--line); padding:10px 11px; background:#fff; color:var(--text); outline:none; }
    textarea { min-height:84px; resize:vertical; }
    input:focus,select:focus,textarea:focus { border-color:#7ba9cd; box-shadow:0 0 0 3px rgba(21,123,192,0.13); }
    button { cursor:pointer; font-weight:700; transition:0.15s ease; }
    button:hover { transform:translateY(-1px); }
    .btn-primary { background:var(--brand); color:#fff; border:none; }
    .btn-soft { background:#f2f7fc; color:var(--brand); border:1px solid #d4e5f5; }
    .btn-ok { background:var(--ok); color:#fff; border:none; }
    .btn-danger { background:var(--danger); color:#fff; border:none; }
    .btn-wa { background:#25d366; color:#fff; border:none; }
    .btn-warn { background:var(--warn); color:#fff; border:none; }
    .btn-purple { background:#7c3aed; color:#fff; border:none; }
    .shell { width:100%; max-width:100%; margin:0 auto; padding:0 16px; box-sizing:border-box; display:grid; gap:12px; direction:rtl; text-align:right; }
    .header { background:linear-gradient(125deg,#0f567f,#1777ab 58%,#1fa3bb); color:#fff; border-radius:20px; box-shadow:var(--shadow); padding:18px; direction:rtl; text-align:right; }
    .header-row { display:flex; align-items:center; justify-content:flex-start; gap:10px; flex-wrap:wrap; direction:rtl; }
    /* Sidebar Navigation */
    .main-layout { display:grid; grid-template-columns:220px 1fr; gap:12px; }
    .sidebar-nav { grid-column:1; grid-row:1; }
    .main-content { grid-column:2; grid-row:1; }
    .sidebar-nav { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:8px; position:sticky; top:16px; max-height:calc(100vh - 32px); overflow-y:auto; scrollbar-width:thin; }
    .sidebar-nav::-webkit-scrollbar { width:4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background:#c5d5e5; border-radius:4px; }
    .sidebar-nav button { width:100%; text-align:right; padding:9px 12px; background:transparent; border:none; border-radius:10px; font-size:13.5px; font-weight:600; color:var(--text); cursor:pointer; transition:all 0.15s ease; display:flex; align-items:center; gap:8px; direction:rtl; margin-bottom:2px; }
    .sidebar-nav button:hover { background:#edf5fc; color:var(--brand); transform:none; }
    .sidebar-nav button.active { background:linear-gradient(125deg,#0f567f,#1777ab); color:#fff; box-shadow:0 4px 12px rgba(15,86,127,0.25); }
    .sidebar-nav button.active:hover { background:linear-gradient(125deg,#0d4a6c,#156898); }
    .sidebar-toggle { display:none; position:fixed; bottom:80px; right:18px; width:48px; height:48px; border-radius:50%; border:none; background:linear-gradient(135deg,#0f567f,#1777ab); color:#fff; font-size:22px; box-shadow:0 8px 20px rgba(15,86,127,0.35); z-index:29; cursor:pointer; padding:0; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:39; }
    .main-content { min-width:0; display:flex; flex-direction:column; align-items:stretch; }
    .main-content > * { width:100%; }
    /* Legacy tabs hidden - replaced by sidebar */
    .tabs { display:flex; gap:8px; flex-wrap:wrap; direction:rtl; }
    .tabs button { width:auto; padding:9px 13px; background:#fff; border:1px solid var(--line); }
    .tabs button.active { background:var(--brand); border-color:transparent; color:#fff; }
    @media (max-width:900px) {
      .main-layout { grid-template-columns:1fr; }
      .sidebar-nav { display:none; position:fixed; top:0; right:0; bottom:0; left:auto; width:260px; max-height:100vh; border-radius:0; z-index:40; box-shadow:4px 0 24px rgba(0,0,0,0.2); padding:16px 8px; grid-column:auto; grid-row:auto; }
      .sidebar-nav.open { display:block; }
      .sidebar-overlay.open { display:block; }
      .sidebar-toggle { display:grid; place-items:center; }
    }
    .kpis { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:8px; direction:rtl; }
    .kpi { background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; text-align:right; direction:rtl; }
    .kpi strong { display:block; font-size:24px; color:var(--brand); }
    .layout-2 { display:grid; grid-template-columns:minmax(0,1.2fr) minmax(0,1fr); gap:12px; direction:rtl; }
    .layout-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; direction:rtl; }
    .list { display:grid; gap:8px; }
    .item { border:1px solid var(--line); border-radius:12px; background:#fff; padding:10px; }
    .item-head { display:flex; align-items:start; justify-content:space-between; gap:8px; margin-bottom:6px; direction:rtl; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; direction:rtl; }
    .chip { background:var(--chip); border:1px solid #d7e8f6; color:#2f5575; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:700; }
    .chip.active-chip { background:var(--brand); color:#fff; border-color:var(--brand); }
    .badge { font-size:12px; border-radius:999px; padding:4px 8px; font-weight:800; }
    .b-ok { background:#dcf4e7; color:#196841; }
    .b-warn { background:#fff2dd; color:#95600f; }
    .b-danger { background:#ffe7e7; color:#9e1f1f; }
    .b-purple { background:#ede9fe; color:#5b21b6; }
    .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; direction:rtl; }
    .row > * { flex:1; min-width:120px; }
    .section-title { color:var(--brand); font-size:21px; margin-bottom:10px; font-weight:800; text-align:right; }
    .sub-title { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .empty { border:1px dashed #c9d8e8; border-radius:12px; background:#fff; color:var(--muted); text-align:center; padding:22px; }
    .small { font-size:13px; }
    .meter { margin-top:4px; height:8px; background:#e6edf5; border-radius:999px; overflow:hidden; }
    .meter > span { display:block; height:100%; background:linear-gradient(270deg,#1675a7,#27a2be); }
    .priority { border-inline-start:4px solid #bf7c15; background:#fffaf1; }
    .priority-high { border-inline-start:4px solid #ba3030; background:#fff3f3; }
    .top-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; direction:rtl; justify-content:flex-start; }
    .meta-pill { background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.28); border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; }
    .dashboard-flow { display:grid; gap:12px; }
    .module-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; direction:rtl; }
    .module { border:1px solid var(--line); border-radius:12px; background:#f8fbff; padding:10px; font-weight:700; color:var(--text); display:flex; align-items:center; justify-content:space-between; gap:8px; direction:rtl; }
    .module .count { color:#fff; background:linear-gradient(120deg,#0f567f,#1f89aa); border-radius:999px; min-width:24px; text-align:center; font-size:12px; padding:2px 7px; }
    .kpi-note { font-size:12px; color:var(--muted); }
    .kpi-trend-up { color:#1d8f5a; font-weight:800; }
    .site-live { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; direction:rtl; }
    .site-card { border:1px solid var(--line); border-radius:12px; background:#fff; padding:10px; }
    .site-card h4 { font-size:15px; color:var(--brand); margin-bottom:6px; }
    .activity-feed { display:grid; gap:8px; }
    .feed-row { border:1px solid var(--line); border-radius:12px; background:#fff; padding:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; direction:rtl; text-align:right; }
    .feed-row strong { color:var(--brand); }
    .quick-actions { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; direction:rtl; }
    .goal-list { display:grid; gap:9px; }
    .goal { border:1px solid var(--line); background:#fff; border-radius:12px; padding:10px; }
    .goal-head { display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:4px; direction:rtl; }
    .history-block { margin-top:8px; border-top:1px dashed var(--line); padding-top:8px; }
    .history-title { font-size:12px; font-weight:800; color:var(--muted); margin-bottom:6px; }
    .history-entry { border:1px solid #dfe9f3; border-radius:10px; background:#f8fbff; padding:8px; margin-bottom:6px; }
    .history-entry:last-child { margin-bottom:0; }
    .site-section { margin-bottom:10px; }
    /* AI FAB */
    .ai-fab { position:fixed; left:18px; bottom:18px; width:58px; height:58px; border-radius:50%; border:0; background:linear-gradient(135deg,#0b6b95,#24a3bf); color:#fff; font-size:26px; box-shadow:0 14px 28px rgba(8,54,79,0.32); z-index:30; }
    .ai-panel { position:fixed; left:18px; bottom:84px; width:min(420px,calc(100vw - 36px)); max-height:70vh; overflow:auto; z-index:31; }
    .ai-log { display:grid; gap:6px; margin-bottom:8px; max-height:290px; overflow:auto; }
    .ai-msg { border-radius:10px; padding:8px 10px; font-size:13px; border:1px solid #dfe9f3; background:#f5faff; white-space:pre-wrap; }
    .ai-msg.assistant { background:#eaf7ff; }
    .ai-msg.user { background:#f2f2ff; }
    /* NATALY BOT */
    .nataly-fab { position:fixed; right:18px; bottom:18px; width:62px; height:62px; border-radius:50%; border:0; background:linear-gradient(135deg,#128c7e,#25d366); color:#fff; font-size:28px; box-shadow:0 14px 28px rgba(18,140,126,0.4); z-index:30; cursor:pointer; }
    /* INCOMING CALL OVERLAY */
    .call-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.55); z-index:100; display:grid; place-items:center; }
    .call-panel { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3); padding:24px; width:min(500px,calc(100vw - 32px)); max-height:85vh; overflow:auto; animation:callSlide 0.3s ease; }
    @keyframes callSlide { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
    .call-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .call-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#0f567f,#1fa3bb); color:#fff; display:grid; place-items:center; font-size:24px; font-weight:800; flex-shrink:0; }
    .call-recording { display:flex; align-items:center; gap:8px; padding:8px 14px; background:#fff3f3; border:1px solid #ffcdd2; border-radius:10px; margin-bottom:12px; }
    .call-rec-dot { width:12px; height:12px; border-radius:50%; background:#e53935; animation:callBlink 1s infinite; }
    @keyframes callBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .call-card-info { background:#f5faff; border:1px solid #d7e8f6; border-radius:12px; padding:12px; margin-bottom:12px; }
    .call-card-info h4 { color:var(--brand); margin-bottom:6px; }
    .call-sim-input { display:flex; gap:6px; align-items:center; }
    .nataly-panel { position:fixed; right:18px; bottom:90px; width:min(380px,calc(100vw - 36px)); max-height:75vh; overflow:auto; z-index:31; background:#fff; border-radius:18px; border:1px solid #d7e1eb; box-shadow:0 20px 50px rgba(0,0,0,0.15); }
    .nataly-header { background:linear-gradient(135deg,#128c7e,#25d366); color:#fff; padding:14px 16px; border-radius:18px 18px 0 0; display:flex; align-items:center; justify-content:space-between; }
    .nataly-chat { padding:12px; display:grid; gap:8px; max-height:320px; overflow-y:auto; }
    .nataly-msg { border-radius:12px; padding:9px 12px; font-size:13px; max-width:90%; }
    .nataly-msg.bot { background:#e8f5e9; color:#1b5e20; align-self:flex-start; }
    .nataly-msg.user { background:#dcf8c6; color:#1b5e20; align-self:flex-end; }
    .nataly-input-row { padding:10px 12px; border-top:1px solid var(--line); display:flex; gap:8px; }
    .nataly-input-row input { flex:1; min-width:0; }
    .nataly-input-row button { width:auto; flex:0; }
    /* KANBAN */
    .kanban-board { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; min-height:300px; direction:rtl; }
    .kanban-col { min-width:190px; flex:1; background:#f0f6fc; border-radius:14px; padding:10px; }
    .kanban-col-title { font-weight:800; color:var(--brand); margin-bottom:8px; font-size:13px; text-align:center; padding:6px; background:#fff; border-radius:8px; border:1px solid var(--line); }
    .kanban-col-count { font-size:11px; color:var(--muted); }
    .kanban-card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px; margin-bottom:7px; cursor:grab; font-size:13px; transition:0.15s; }
    .kanban-card:hover { border-color:var(--brand); box-shadow:0 4px 12px rgba(15,86,127,0.12); }
    .kanban-card.dragging { opacity:0.4; transform:rotate(2deg); }
    .kanban-col.drag-over { background:#ddeef9; border:2px dashed var(--brand); }
    .kanban-add { background:transparent; border:1px dashed var(--line); color:var(--muted); font-size:12px; padding:6px; margin-top:4px; }
    .kanban-add:hover { background:#f0f6fc; border-color:var(--brand); color:var(--brand); }
    /* AUTOCOMPLETE */
    .autocomplete-wrap { position:relative; }
    .autocomplete-list { position:absolute; top:100%; right:0; left:0; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); z-index:50; max-height:220px; overflow-y:auto; }
    .autocomplete-item { padding:9px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid #eef3f8; }
    .autocomplete-item:hover { background:#f0f7ff; }
    .autocomplete-item .ac-sub { font-size:11px; color:var(--muted); }
    /* CALENDAR */
    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-day { border:1px solid var(--line); border-radius:8px; padding:6px; min-height:72px; background:#fff; font-size:12px; }
    .cal-day.today { border-color:var(--brand); background:#edf5fc; }
    .cal-day.has-event { border-color:var(--ok); }
    .cal-event { background:var(--brand); color:#fff; border-radius:4px; padding:2px 5px; font-size:10px; margin-top:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cal-event.birthday { background:#e91e8c; }
    .cal-event.trip { background:var(--ok); }
    .cal-event.task-high { background:var(--danger); }
    /* TASKS */
    .task-item { border:1px solid var(--line); border-radius:10px; background:#fff; padding:10px; display:flex; align-items:center; gap:10px; direction:rtl; text-align:right; }
    .task-item.overdue { border-color:var(--danger); background:#fff5f5; }
    .task-item.done { opacity:0.55; text-decoration:line-through; }
    /* FOLDER TABS */
    .folder-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
    .folder-tab { padding:7px 14px; border-radius:999px; border:1px solid var(--line); background:#f2f7fc; color:var(--brand); font-weight:700; font-size:13px; cursor:pointer; transition:0.15s; }
    .folder-tab.active { background:var(--brand); color:#fff; border-color:var(--brand); }
    /* CURRENCY TABLE */
    .currency-table { width:100%; border-collapse:collapse; font-size:13px; }
    .currency-table th { background:var(--brand); color:#fff; padding:8px 10px; text-align:right; }
    .currency-table td { padding:7px 10px; border-bottom:1px solid var(--line); }
    .currency-table tr:hover td { background:#f0f7ff; }
    /* ROUTE PLAN */
    .route-day { border:1px solid var(--line); border-radius:10px; background:#fff; padding:10px; margin-bottom:8px; }
    .route-day-title { font-weight:800; color:var(--brand); margin-bottom:6px; }
    /* IMPORT SMART */
    .import-zone { border:2px dashed var(--line); border-radius:12px; padding:20px; text-align:center; background:#f8fbff; cursor:pointer; transition:0.2s; position:relative; }
    .import-zone:hover { border-color:var(--brand); background:#edf5fc; }
    .import-zone.drag-over { border-color:var(--brand); background:#dbeafe; transform:scale(1.02); box-shadow:0 4px 16px rgba(59,130,246,0.15); }
    .import-zone .iz-icon { font-size:28px; display:block; margin-bottom:6px; }
    .import-zone .iz-label { font-size:13px; color:#666; }
    .import-zone .iz-file-name { font-size:12px; color:var(--brand); margin-top:4px; font-weight:600; }
    .import-card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; transition:0.2s; }
    .import-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.06); }
    .import-card .import-card-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .import-card .import-card-head .ic-icon { font-size:32px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; border-radius:12px; }
    .import-card .import-card-head h4 { margin:0; font-size:15px; }
    .import-card .import-card-head .small { color:#888; margin-top:2px; }
    .import-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .import-grid .import-card-full { grid-column:1/-1; }
    .ic-trav { background:linear-gradient(135deg,#dbeafe,#eff6ff); }
    .ic-lead { background:linear-gradient(135deg,#fef3c7,#fefce8); }
    .ic-cont { background:linear-gradient(135deg,#d1fae5,#ecfdf5); }
    .ic-hr { background:linear-gradient(135deg,#ede9fe,#f5f3ff); }
    .ic-org { background:linear-gradient(135deg,#fce7f3,#fdf2f8); }
    .wa-smart-section { background:linear-gradient(135deg,#dcfce7,#f0fdf4); border:2px solid #86efac; border-radius:16px; padding:20px; }
    .wa-smart-section .wa-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .wa-smart-section .wa-head .wa-logo { font-size:36px; }
    .wa-preview-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
    .wa-preview-table th { background:#f0fdf4; padding:6px 8px; text-align:right; font-weight:600; border-bottom:2px solid #86efac; }
    .wa-preview-table td { padding:5px 8px; border-bottom:1px solid #e5e7eb; }
    .wa-preview-table tr:hover td { background:#f0fdf4; }
    .wa-stats { display:flex; gap:12px; flex-wrap:wrap; margin:10px 0; }
    .wa-stat { background:#fff; border-radius:10px; padding:8px 14px; display:flex; align-items:center; gap:6px; font-size:13px; border:1px solid #e5e7eb; }
    .wa-stat .wa-stat-num { font-weight:700; font-size:18px; color:#22c55e; }
    .wa-tabs { display:flex; gap:6px; margin-bottom:12px; }
    .wa-tab { padding:6px 14px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid #d1d5db; background:#fff; transition:0.2s; }
    .wa-tab.active { background:#25d366; color:#fff; border-color:#25d366; }
    .wa-file-drop { border:2px dashed #86efac; border-radius:12px; padding:16px; text-align:center; background:#f0fdf4; cursor:pointer; transition:0.2s; margin-bottom:10px; }
    .wa-file-drop:hover { border-color:#22c55e; background:#dcfce7; }
    .wa-file-drop.drag-over { border-color:#16a34a; background:#bbf7d0; transform:scale(1.01); }
    /* SMART FOLDER */
    .smart-folder { border:1px solid var(--line); border-radius:12px; background:#fff; padding:12px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .smart-folder .folder-icon { font-size:28px; }
    .smart-folder .folder-info { flex:1; }
    .smart-folder .folder-count { font-size:22px; font-weight:800; color:var(--brand); }
    /* GUIDE TAB */
    .guide-section { border:1px solid var(--line); border-radius:14px; background:#fff; padding:16px; margin-bottom:12px; }
    .guide-section h3 { color:var(--brand); font-size:18px; margin-bottom:8px; }
    .guide-section p, .guide-section li { font-size:14px; line-height:1.7; color:var(--text); }
    .guide-section ul { padding-right:20px; margin:8px 0; }
    .guide-section .guide-step { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid #f0f4f8; }
    .guide-section .guide-step:last-child { border-bottom:none; }

    // ===== UTILITY FUNCTIONS =====
    function uid() { return Date.now() + Math.floor(Math.random()*99999); }
    function isoNow() { return new Date().toISOString(); }
    function escapeHtml(s) {
      if (s==null) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function tip(label, tipText) {
      return '<span class="field-with-tip"><label>'+label+' <span class="tip-icon">?<span class="tip-text">'+escapeHtml(tipText)+'</span></span></label></span>';
    }
    function parseNumber(v) { const n=Number(v); return Number.isFinite(n)?n:""; }
    function parseBoolean(v) { if(typeof v==="boolean") return v; const s=String(v||"").toLowerCase(); return s==="true"||s==="1"||s==="כן"||s==="yes"; }
    function parseSegments(v) { if(Array.isArray(v)) return v.filter(s=>SEGMENTS.includes(s)); if(!v) return []; return String(v).split(/[,;|]/).map(s=>s.trim()).filter(s=>SEGMENTS.includes(s)); }
    function normalizePhone(v) { if(!v) return ""; return String(v).replace(/\D/g,"").replace(/^972/,"0"); }
    function phoneForWa(p) { const d=normalizePhone(p); if(!d) return ""; return d.startsWith("0")?"972"+d.slice(1):d; }
    function fmtDateShort(v) { if(!v) return ""; try { return new Date(v).toLocaleDateString("he-IL"); } catch { return String(v); } }
    function normalizeBirthday(v) { if(!v) return ""; const s=String(v).trim(); const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[0]; const m2=s.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})$/); if(m2) { const y=m2[3].length===2?"20"+m2[3]:m2[3]; return y+"-"+m2[2].padStart(2,"0")+"-"+m2[1].padStart(2,"0"); } return ""; }
    function birthMonthDay(v) { const n=normalizeBirthday(v); return n?n.slice(5):""; }
    function isBirthdayToday(v) { const md=birthMonthDay(v); if(!md) return false; const now=new Date(); return md===String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0"); }
    function countryTravelByName(name) { return COUNTRY_TRAVEL_CATALOG.find(x=>x.country===name)||COUNTRY_TRAVEL_CATALOG[0]; }
    function weatherCodeText(code) {
      const n=Number(code);
      if(n===0) return "שמיים בהירים"; if(n<=3) return "מעונן חלקית"; if(n<=9) return "ערפל";
      if(n<=19) return "גשם קל"; if(n<=29) return "סופה"; if(n<=39) return "שלג";
      if(n<=49) return "ערפל"; if(n<=59) return "טפטוף"; if(n<=69) return "גשם";
      if(n<=79) return "שלג"; if(n<=99) return "סופת רעמים"; return "לא ידוע";
    }
    function formatCurrencyAmount(val,currency) {
      if(val==null||val==="") return "—";
      const num=Number(val); if(!Number.isFinite(num)) return "—";
      const symbols={ILS:"₪",USD:"$",EUR:"€",GBP:"£",JPY:"¥",AUD:"A$",CAD:"C$"};
      const sym=symbols[currency]||(currency+" ");
      return sym+num.toLocaleString("he-IL",{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function getWeatherCitiesByScope() { return ISRAEL_CITIES; }
    function messageTraveler(id) { const t=travelerById(id); if(!t) return; const wa=phoneForWa(t.whatsapp||t.phone); if(wa) window.open("https://wa.me/"+wa,"_blank"); }
    function callTraveler(id) { const t=travelerById(id); if(!t) return; if(t.phone) window.location.href="tel:"+t.phone; }
    function openWeather(city) { window.open("https://www.google.com/search?q=מזג+אוויר+"+encodeURIComponent(city),"_blank"); }

    // ===== USER MANAGEMENT =====
    function loadUsers() {
      try { const raw=localStorage.getItem(USERS_STORAGE_KEY); if(raw) return JSON.parse(raw); } catch(_) {}
      return SYSTEM_USERS.map(u=>({...u}));
    }
    function saveUsers(users) { try { localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users)); } catch(_) {} }
    function getUserPassword(username) { const users=loadUsers(); const u=users.find(x=>x.username===username); return u?u.password:null; }
    function changeUserPassword(username, oldPass, newPass) {
      const users=loadUsers(); const u=users.find(x=>x.username===username);
      if(!u) return "משתמש לא נמצא";
      if(u.password!==oldPass) return "סיסמה ישנה שגויה";
      if(!newPass||newPass.length<4) return "סיסמה חדשה חייבת להכיל לפחות 4 תווים";
      u.password=newPass; saveUsers(users); return null;
    }
    function markOnline(username) {
      try { const data=JSON.parse(localStorage.getItem(ONLINE_STORAGE_KEY)||"{}"); data[username]=Date.now(); localStorage.setItem(ONLINE_STORAGE_KEY, JSON.stringify(data)); } catch(_) {}
    }
    function getOnlineUsers() {
      try { const data=JSON.parse(localStorage.getItem(ONLINE_STORAGE_KEY)||"{}"); const now=Date.now(); const threshold=5*60*1000;
        return Object.entries(data).filter(([k,v])=>(now-v)<threshold).map(([k])=>k);
      } catch(_) { return []; }
    }
    function heartbeat() { if(S.isAuthenticated&&S.currentUser) markOnline(S.currentUser); }
    setInterval(heartbeat, 30000);

    // ===== ACTIVITY LOG =====
    function loadActivityLog() { try { const raw=localStorage.getItem(ACTIVITY_LOG_KEY); if(raw) return JSON.parse(raw); } catch(_) {} return []; }
    function saveActivityLog(log) { try { localStorage.setItem(ACTIVITY_LOG_KEY, JSON.stringify(log.slice(0,500))); } catch(_) {} }
    function logActivity(action, details) {
      const log=loadActivityLog();
      log.unshift({id:uid(),user:S.currentUser||"מערכת",action:action,details:details||"",at:isoNow()});
      saveActivityLog(log);
      if (!S.activityLog) S.activityLog = [];
      S.activityLog = log.slice(0,500);
    }
    // ===== CHANGE LOG (Audit Trail) =====
    function logChange(entityType, entityId, entityName, action, details) {
      if (!S.changeLog) S.changeLog = [];
      S.changeLog.unshift({
        id: uid(),
        user: S.currentUser || "מערכת",
        entityType: entityType,
        entityId: entityId,
        entityName: entityName || "",
        action: action,
        details: details || "",
        at: isoNow()
      });
      if (S.changeLog.length > 2000) S.changeLog = S.changeLog.slice(0, 2000);
    }
    // ===== CARD DOCUMENTATION =====
    function addCardDoc(entityType, entityId, content) {
      if (!content || !content.trim()) return alert("נא למלא תוכן תיעוד");
      const entry = { id: uid(), user: S.currentUser || "מערכת", content: content.trim(), at: isoNow() };
      let entity = null;
      if (entityType === "traveler") { entity = S.travelers.find(t => t.id == entityId); if (entity) { if (!Array.isArray(entity.cardDocs)) entity.cardDocs = []; entity.cardDocs.unshift(entry); setState({travelers: S.travelers}); } }
      else if (entityType === "lead") { entity = S.leads.find(l => l.id == entityId); if (entity) { if (!Array.isArray(entity.cardDocs)) entity.cardDocs = []; entity.cardDocs.unshift(entry); setState({leads: S.leads}); } }

    function extractDataForCloud() {
      const d = {};

      return d;
    }
    function applyCloudData(d) {
      if (!d) return;
      DATA_FIELDS.forEach(k => { if (Array.isArray(d[k])) S[k] = d[k]; });

    let _offlineMode = false;

    const MAX_SAVE_RETRIES = 3;
    async function saveToCloud() {
      if (_isSaving) return;
      _isSaving = true;
      try {
        const resp = await fetch(API_URL, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({data: extractDataForCloud()})
        });
        let json;
        try { json = await resp.json(); } catch(_) { json = { ok: false }; }
        if (json.ok) {
          S.cloudVersion = json.version;
          S.syncOkAt = new Date().toLocaleTimeString("he-IL");
          S.syncError = "";
          _saveRetryCount = 0;
          if (_offlineMode) { _offlineMode = false; }
        } else {
          _saveRetryCount++;
          if (_saveRetryCount >= MAX_SAVE_RETRIES) { _offlineMode = true; S.syncError = "שגיאת סנכרון – עובר למצב לא מקוון"; }
          else { S.syncError = ""; }
        }
      } catch(e) {
        _saveRetryCount++;
        if (_saveRetryCount >= MAX_SAVE_RETRIES) { _offlineMode = true; S.syncError = "שגיאת חיבור – עובר למצב לא מקוון"; }
        else { S.syncError = ""; }
      }
      _isSaving = false;
      renderSyncMeta();
    }
    async function loadFromCloud() {
      try {
        const resp = await fetch(API_URL + "?v=" + (S.cloudVersion||"0"));
        let json;
        try { json = await resp.json(); } catch(_) { json = { ok: false }; }
        if (json.ok && !json.unchanged && json.data) {
          applyCloudData(json.data);
          S.cloudVersion = json.version || "0";
          S.syncOkAt = new Date().toLocaleTimeString("he-IL");
          S.syncError = "";
          _saveRetryCount = 0;
          if (_offlineMode) { _offlineMode = false; }
          normalizeStateShape();
          saveLocal();
          render();
          renderSyncMeta();
        } else if (json.ok && json.unchanged) {
          _saveRetryCount = 0;
          if (_offlineMode) { _offlineMode = false; renderSyncMeta(); }
        }
      } catch(e) {
        _offlineMode = true;
        renderSyncMeta();
      }
    }
    async function pollCloud() {
      if (_isSaving || !S.isAuthenticated) return;

        const resp = await fetch(API_URL + "?check=1");
        let json;

        if (json.ok && json.version !== S.cloudVersion) {
          await loadFromCloud();
        }
      } catch(_) {
        _offlineMode = true;
        renderSyncMeta();
      }

    function searchGuide(query) {
      var q = query.toLowerCase();
      var sections = getGuideContent();
      var results = [];
      for(var i=0; i<sections.length; i++) {
        var s = sections[i];
        var topicWords = s.topic.toLowerCase().split(",");
        var score = 0;
        for(var j=0; j<topicWords.length; j++) {
          if(q.includes(topicWords[j].trim())) score += 3;
          else if(topicWords[j].trim().includes(q)) score += 2;
        }
        var qWords = q.split(/\s+/);
        for(var k=0; k<qWords.length; k++) {
          if(qWords[k].length < 2) continue;
          if(s.topic.toLowerCase().includes(qWords[k])) score += 2;
          if(s.answer.toLowerCase().includes(qWords[k])) score += 1;
        }
        if(score > 0) results.push({score:score, answer:s.answer});
      }
      results.sort(function(a,b){return b.score - a.score;});
      return results.slice(0, 3);
    }

    function sendLilaMessage() {
      const msg=(S.lilaInput||"").trim(); if(!msg) return;
      S.lilaHistory.push({role:"user",text:msg});
      S.lilaInput="";

      // Check if user is greeting - respond with time-based greeting
      var greetWords = ["שלום","היי","הי","בוקר טוב","ערב טוב","צהריים טובים","מה נשמע","מה קורה","hello","hi"];
      var isGreet = greetWords.some(function(w){ return msg.toLowerCase().includes(w); });

      var response;
      if (isGreet) {
        var greeting = getTimeGreeting();
        response = greeting + "! 😊 אני לילה, כאן לעזור לכם עם כל שאלה על המערכת. שאלו אותי על כל מודול, תהליך או פרמטר – ואסביר לעומק!";
      } else {
        // Search the operation guide for relevant answers
        var results = searchGuide(msg);
        if(results.length > 0 && results[0].score >= 2) {
          response = results[0].answer;
          if(results.length > 1 && results[1].score >= 3) {
            response += "\n\n💡 מידע נוסף: " + results[1].answer;
          }
          if(results.length > 2 && results[2].score >= 2) {
            response += "\n\n🔍 ראו גם: " + results[2].answer;
          }
          response = "📖 " + response;
        } else {
          response = "לא מצאתי תשובה מדויקת במדריך ההפעלה. נסו לנסח אחרת, או פנו לאיציק לעזרה. 💡 טיפ: שאלו על מודול ספציפי, למשל: \"איך מוסיפים ליד?\" או \"מה ההרשאות של מדריך?\" או \"איך עובד הסנכרון?\"";
        }
      }

      S.lilaHistory.push({role:"assistant",text:response});
      render();
      // Scroll chat to bottom
      setTimeout(function(){ var el=document.getElementById('lila_messages'); if(el) el.scrollTop=el.scrollHeight; }, 50);
    }
    function travelerBirthdayRows() {
      const today=new Date(); const todayMD=String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
      return S.travelers.filter(t=>birthMonthDay(t.birthday)).map(t=>{
        const md=birthMonthDay(t.birthday);
        const isToday=md===todayMD;
        const parts=md.split("-"); const month=parseInt(parts[0]); const day=parseInt(parts[1]);
        const thisYear=today.getFullYear(); let next=new Date(thisYear,month-1,day);
        if(next<today) next=new Date(thisYear+1,month-1,day);
        const daysUntil=Math.ceil((next-today)/86400000);
        return {...t,birthdayMonthDay:md,isToday,daysUntil};
      }).sort((a,b)=>a.daysUntil-b.daysUntil);
    }

    // ===== ROUTE BUILDER =====
    function buildRoutePlan() {
      const country=countryTravelByName(S.routeCountry);
      const days=parseInt(S.routeDays)||5;
      const style=S.routeStyle||"מאוזן";
      const highlights=country.highlights||[];
      const styleNote=style==="רגוע"?"עם הרבה זמן חופשי ומנוחה":style==="אינטנסיבי"?"עם מקסימום אטרקציות ביום":"בקצב מאוזן ונוח";
      let plan=`מסלול טיול ל${country.country} – ${days} ימים (${style})\n`;
      plan+=`מטבע מקומי: ${country.currency} | יבשת: ${country.continent}\n`;
      plan+=`─────────────────────────────────\n`;
      for(let d=1;d<=days;d++) {
        const h1=highlights[(d-1)*2%highlights.length]||"";
        const h2=highlights[(d-1)*2+1%highlights.length]||"";
        plan+=`יום ${d}: `;
        if(d===1) plan+=`הגעה ל${country.city}, צ'ק-אין, טיול ראשוני ב${h1||"מרכז העיר"}\n`;
        else if(d===days) plan+=`ביקור אחרון ב${h1||"שוק מקומי"}, קניות מזכרות, טיסה חזרה\n`;
        else plan+=`${h1||"אטרקציה מרכזית"} בבוקר${styleNote.includes("מנוחה")?" + מנוחה אחה\"צ":" + "+( h2||"אטרקציה נוספת")+" אחה\"צ"}\n`;
      }
      plan+=`─────────────────────────────────\n`;
      plan+=`טיפים: ${country.highlights.slice(0,3).join(", ")}\n`;
      plan+=`סגנון: ${styleNote}`;
      setState({routePlan:plan});
    }

    // ===== CAMPAIGN MODULE (Advanced Group Messaging) =====
    function getCampaignAudience() {
      const a=S.campaignAudience||"travelers";
      if(a==="travelers") return S.travelers.slice();
      if(a==="leads") return S.leads.slice();
      if(a==="contacts") return S.contacts.slice();
      if(a==="hr") return (S.hrManagers||[]).slice();
      return [...S.travelers,...S.leads,...S.contacts,...(S.hrManagers||[])];
    }
    function filterCampaignAudience() {
      var rows=getCampaignAudience();
      var segs=S.campaignSegments||[];
      var cats=S.campaignCategories||[];
      var regions=S.campaignRegions||[];
      var levels=S.campaignWalkingLevels||[];
      var ageMin=parseInt(S.campaignAgeMin)||0;
      var ageMax=parseInt(S.campaignAgeMax)||0;
      var city=(S.campaignCity||"").trim();
      var activeOnly=S.campaignActiveOnly;
      var returningOnly=S.campaignReturningOnly;
      var excluded=S.campaignExcluded||[];
      if(segs.length) rows=rows.filter(function(r){ var rs=r.segments||r.interestGroups||[]; return segs.some(function(s){return rs.includes(s);}); });
      if(cats.length) rows=rows.filter(function(r){ var rc=r.preferredCategories||[]; if(r.preferredCategory&&!rc.includes(r.preferredCategory)) rc=rc.concat(r.preferredCategory); return cats.some(function(c){return rc.includes(c);}); });
      if(regions.length) rows=rows.filter(function(r){ var pr=r.preferredRegions||[]; if(r.region&&!pr.includes(r.region)) pr=pr.concat(r.region); return regions.some(function(reg){return pr.includes(reg);})||!pr.length; });
      if(levels.length) rows=rows.filter(function(r){ return r.walkingLevel&&levels.includes(r.walkingLevel); });
      if(ageMin>0) rows=rows.filter(function(r){ var a=parseInt(r.age)||0; return a>=ageMin||a===0; });
      if(ageMax>0) rows=rows.filter(function(r){ var a=parseInt(r.age)||0; return a<=ageMax||a===0; });
      if(city) rows=rows.filter(function(r){ return (r.city||"").includes(city); });
      if(activeOnly) rows=rows.filter(function(r){ return r.active!==false; });
      if(returningOnly) rows=rows.filter(function(r){ return r.returningCustomer===true; });
      // Apply exclusions
      if(excluded.length) rows=rows.filter(function(r){ return !excluded.includes(r.id); });
      return rows;
    }

    function simulateIncomingCall(receivedAtPhone) {
      const num = String(S.incomingCallNumber||"").replace(/[\s\-\(\)]/g,"");
      if(!num) { alert("הזן מספר טלפון של המתקשר"); return; }
      const normalized = normalizePhone(num);
      // Search travelers, contacts, leads, suppliers, and HR for matching phone
      let match = null;
      const traveler = S.travelers.find(t => normalizePhone(t.phone) === normalized || normalizePhone(t.whatsapp) === normalized);
      if(traveler) { match = {type:"traveler", data:traveler}; }
      else {
        const contact = S.contacts.find(c => normalizePhone(c.phone) === normalized);
        if(contact) { match = {type:"contact", data:contact}; }
        else {
          const lead = S.leads.find(l => normalizePhone(l.phone) === normalized);
          if(lead) { match = {type:"lead", data:lead}; }
          else {
            const supplier = S.suppliers.find(s => normalizePhone(s.phone) === normalized);
            if(supplier) { match = {type:"supplier", data:supplier}; }
            else {
              const hr = S.hrManagers.find(h => normalizePhone(h.phone) === normalized);
              if(hr) { match = {type:"hr", data:hr}; }
            }
          }
        }
      }
      setState({incomingCallOpen:true, incomingCallMatch:match, incomingCallNote:"", incomingCallRecording:true, incomingCallRecorded:false, incomingCallReceivedAt: receivedAtPhone || GOTOURS_PHONE});

    function parseWhatsAppContacts(raw) {
      const lines=raw.split(/\n/);
      const contacts=[];
      const seen=new Set();
      const chatLineRe=/^\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4},?\s*\d{1,2}:\d{2}\s*-\s*(.+?):\s/;
      const phoneRe=/((?:\+?\d{1,3}[\s\-]?)?\(?\d{2,4}\)?[\s\-]?\d{3,4}[\s\-]?\d{3,4})/;
      const vcardNameRe=/^FN[;:](.+)/i;
      const vcardTelRe=/^TEL[;:].*?:([\d\+\-\s]+)/i;
      let vcardName="",vcardPhone="";
      let msgCount=0;
      for(let i=0;i<lines.length;i++){
        const line=lines[i].trim(); if(!line) continue;
        const vnm=line.match(vcardNameRe);
        if(vnm){vcardName=vnm[1].trim();continue;}
        const vtel=line.match(vcardTelRe);
        if(vtel){vcardPhone=vtel[1].replace(/[\s\-]/g,"").trim();
          if(vcardName&&vcardPhone&&!seen.has(vcardPhone)){seen.add(vcardPhone);contacts.push({fullName:vcardName,phone:normalizePhone(vcardPhone),msgCount:0});}
          vcardName="";vcardPhone="";continue;
        }
        const chatMatch=line.match(chatLineRe);
        if(chatMatch){
          msgCount++;
          let nameOrPhone=chatMatch[1].trim();
          const ph=nameOrPhone.match(phoneRe);
          if(ph){const p=normalizePhone(ph[1]);if(p&&!seen.has(p)){seen.add(p);contacts.push({fullName:nameOrPhone.replace(phoneRe,"").trim()||p,phone:p,msgCount:1});}else{const ex=contacts.find(c=>c.phone===p);if(ex)ex.msgCount++;}}
          else if(nameOrPhone&&!seen.has(nameOrPhone)){seen.add(nameOrPhone);contacts.push({fullName:nameOrPhone,phone:"",msgCount:1});}
          else{const ex=contacts.find(c=>c.fullName===nameOrPhone);if(ex)ex.msgCount++;}
          continue;
        }
        const parts=line.split(/[\t,;\|]|\s{2,}|\s*-\s*/).map(s=>s.trim()).filter(Boolean);
        if(parts.length>=2){
          let name="",phone="";
          for(const p of parts){ const pm=p.match(phoneRe); if(pm&&!phone) phone=normalizePhone(pm[1]); else if(!name) name=p; }
          if(phone&&!seen.has(phone)){seen.add(phone);contacts.push({fullName:name||phone,phone:phone,msgCount:0});}
        } else if(parts.length===1){
          const pm=parts[0].match(phoneRe);
          if(pm){const p=normalizePhone(pm[1]);if(p&&!seen.has(p)){seen.add(p);contacts.push({fullName:p,phone:p,msgCount:0});}}
        }
      }
      return {contacts,totalMessages:msgCount};
    }

      const raw=String(S.waImportText||"").trim(); if(!raw) return alert("יש להדביק טקסט מקבוצת וואטסאפ");
      try {
        const lines=raw.split(/\n/);

        const seen=new Set();
        // Pattern 1: WhatsApp exported chat format "DD/MM/YYYY, HH:MM - Name: message" or "DD.MM.YYYY, HH:MM - +972XXXXXXXXX: message"
        const chatLineRe=/^\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4},?\s*\d{1,2}:\d{2}\s*-\s*(.+?):\s/;
        // Pattern 2: WhatsApp group info export "Name  phone" or "phone  Name" or just lines with phone numbers
        const phoneRe=/((?:\+?\d{1,3}[\s\-]?)?\(?\d{2,4}\)?[\s\-]?\d{3,4}[\s\-]?\d{3,4})/;
        // Pattern 3: vCard-style (from WhatsApp contact export)
        const vcardNameRe=/^FN[;:](.+)/i;
        const vcardTelRe=/^TEL[;:].*?:([\d\+\-\s]+)/i;
        let vcardName="",vcardPhone="";
        for(let i=0;i<lines.length;i++){
          const line=lines[i].trim(); if(!line) continue;
          // vCard parsing
          const vnm=line.match(vcardNameRe);
          if(vnm){vcardName=vnm[1].trim();continue;}
          const vtel=line.match(vcardTelRe);
          if(vtel){vcardPhone=vtel[1].replace(/[\s\-]/g,"").trim();
            if(vcardName&&vcardPhone&&!seen.has(vcardPhone)){seen.add(vcardPhone);contacts.push({id:uid(),fullName:vcardName,phone:normalizePhone(vcardPhone),email:"",role:"",company:"tiyoolim.com",organization:"",orgField:"אחר",domain:"",groupName:"ייבוא וואטסאפ",notes:"יובא מקבוצת וואטסאפ",active:true});}
            vcardName="";vcardPhone="";continue;
          }
          // Chat line parsing
          const chatMatch=line.match(chatLineRe);
          if(chatMatch){
            let nameOrPhone=chatMatch[1].trim();
            const ph=nameOrPhone.match(phoneRe);
            if(ph){const p=normalizePhone(ph[1]);if(p&&!seen.has(p)){seen.add(p);contacts.push({id:uid(),fullName:nameOrPhone.replace(phoneRe,"").trim()||p,phone:p,email:"",role:"",company:"tiyoolim.com",organization:"",orgField:"אחר",domain:"",groupName:"ייבוא וואטסאפ",notes:"יובא מקבוצת וואטסאפ",active:true});}}
            else if(nameOrPhone&&!seen.has(nameOrPhone)){seen.add(nameOrPhone);contacts.push({id:uid(),fullName:nameOrPhone,phone:"",email:"",role:"",company:"tiyoolim.com",organization:"",orgField:"אחר",domain:"",groupName:"ייבוא וואטסאפ",notes:"יובא מקבוצת וואטסאפ – ללא טלפון",active:true});}
            continue;
          }
          // Simple line: "Name - Phone" or "Phone - Name" or "Name, Phone" or tab separated
          const parts=line.split(/[\t,;\|]|\s{2,}|\s*-\s*/).map(s=>s.trim()).filter(Boolean);
          if(parts.length>=2){
            let name="",phone="";
            for(const p of parts){ const pm=p.match(phoneRe); if(pm&&!phone) phone=normalizePhone(pm[1]); else if(!name) name=p; }
            if(phone&&!seen.has(phone)){seen.add(phone);contacts.push({id:uid(),fullName:name||phone,phone:phone,email:"",role:"",company:"tiyoolim.com",organization:"",orgField:"אחר",domain:"",groupName:"ייבוא וואטסאפ",notes:"יובא מקבוצת וואטסאפ",active:true});}
          } else if(parts.length===1){
            const pm=parts[0].match(phoneRe);
            if(pm){const p=normalizePhone(pm[1]);if(p&&!seen.has(p)){seen.add(p);contacts.push({id:uid(),fullName:p,phone:p,email:"",role:"",company:"tiyoolim.com",organization:"",orgField:"אחר",domain:"",groupName:"ייבוא וואטסאפ",notes:"יובא מקבוצת וואטסאפ",active:true});}}
          }
        }
        if(contacts.length===0) return alert("לא נמצאו אנשי קשר בטקסט. ודאו שהדבקתם טקסט מייצוא צ׳אט או רשימת אנשי קשר של וואטסאפ.");
        S.contacts.unshift(...contacts);
        setState({contacts:S.contacts,waImportMsg:"יובאו "+contacts.length+" אנשי קשר מוואטסאפ",waImportText:""});
      } catch(_) { alert("שגיאה בייבוא אנשי קשר מוואטסאפ"); }
    }

        if(Array.isArray(data.suppliers)){data.suppliers.forEach(x=>{if(!x||!x.name) return; S.suppliers.unshift({...structuredClone(seed.supplierForm),...x,id:uid(),name:String(x.name).trim()}); merged++; });}
        setState({travelers:S.travelers,leads:S.leads,suppliers:S.suppliers}); alert("מוזגו "+merged+" רשומות");
      } catch(_) { alert("טעינת URL נכשלה. נדרש URL שמחזיר JSON."); }
    }

    // ===== RENDER CALENDAR & TASKS =====
    function renderCalendarTab() {
      const year=S.calendarYear||new Date().getFullYear();
      const month=S.calendarMonth!=null?S.calendarMonth:new Date().getMonth();
      const today=new Date();
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      const monthNames=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
      const dayNames=["א","ב","ג","ד","ה","ו","ש"];
      const f=S.taskForm;
      const tasks=S.tasks||[];
      const overdue=tasks.filter(t=>!t.done&&t.dueDate&&new Date(t.dueDate)<today);
      const upcoming=tasks.filter(t=>!t.done&&t.dueDate&&new Date(t.dueDate)>=today).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
      const done=tasks.filter(t=>t.done);
      return '<div class="layout-2">'
        + '<div class="card"><div class="section-title">📅 לוח שנה – '+escapeHtml(monthNames[month])+" "+year+'</div>'
        + '<div class="row" style="margin-bottom:10px">'
        + '<button class="btn-soft" style="width:auto" onclick="setState({calendarMonth:'+(month===0?11:month-1)+',calendarYear:'+(month===0?year-1:year)+'},false)">◀</button>'
        + '<strong style="flex:1;text-align:center">'+escapeHtml(monthNames[month])+" "+year+'</strong>'
        + '<button class="btn-soft" style="width:auto" onclick="setState({calendarMonth:'+(month===11?0:month+1)+',calendarYear:'+(month===11?year+1:year)+'},false)">▶</button>'
        + '</div>'
        + '<div class="cal-header-row">'+dayNames.map(d=>'<div class="cal-header-cell">'+d+'</div>').join("")+'</div>'
        + '<div class="calendar-grid">'
        + Array(firstDay).fill('<div></div>').join("")
        + Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1;
          const dateStr=year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
          const dayTasks=tasks.filter(t=>t.dueDate===dateStr);
          const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
          const bdays=travelerBirthdayRows().filter(t=>t.birthdayMonthDay===String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"));
          return '<div class="cal-day '+(isToday?"today":"")+(dayTasks.length?" has-event":"")+'"><div style="font-weight:700;font-size:12px">'+day+'</div>'
            + dayTasks.map(t=>'<div class="cal-event '+(t.priority==="גבוהה"?"task-high":"")+'" title="'+escapeHtml(t.title)+'">'+escapeHtml(t.title.slice(0,10))+'</div>').join("")
            + bdays.map(b=>'<div class="cal-event birthday" title="יום הולדת: '+escapeHtml(b.fullName)+'">🎂 '+escapeHtml(b.fullName.split(" ")[0])+'</div>').join("")
            + '</div>';
        }).join("")
        + '</div>'
        + '<div style="margin-top:10px"><button class="btn-primary" onclick="connectGoogle()">🔗 סנכרון Google Calendar</button></div>'
        + '<div class="cal-stats">'
        + '<div class="cal-stat"><strong style="color:var(--danger)">'+overdue.length+'</strong><div class="cal-stat-label">באיחור</div></div>'
        + '<div class="cal-stat"><strong>'+upcoming.length+'</strong><div class="cal-stat-label">קרובות</div></div>'
        + '<div class="cal-stat"><strong style="color:var(--ok)">'+done.length+'</strong><div class="cal-stat-label">הושלמו</div></div>'
        + '</div>'
        + '</div>'
        + '<div>'
        + '<div class="card" style="margin-bottom:12px"><div class="section-title">הוספת משימה</div>'
        + '<div class="grid">'
        + '<div><label>כותרת</label><input value="'+escapeHtml(f.title)+'" oninput="S.taskForm.title=this.value" placeholder="תיאור המשימה..."></div>'
        + '<div><label>תאריך יעד</label><input type="date" value="'+escapeHtml(f.dueDate)+'" oninput="S.taskForm.dueDate=this.value"></div>'
        + '<div><label>אחראי</label><input value="'+escapeHtml(f.assignedTo)+'" oninput="S.taskForm.assignedTo=this.value"></div>'
        + '<div><label>עדיפות</label><select onchange="S.taskForm.priority=this.value"><option '+(f.priority==="גבוהה"?"selected":"")+'>גבוהה</option><option '+(f.priority==="בינונית"?"selected":"")+'>בינונית</option><option '+(f.priority==="נמוכה"?"selected":"")+'>נמוכה</option></select></div>'
        + '</div>'
        + '<button class="btn-ok" style="margin-top:10px" onclick="saveTask()">'+escapeHtml(f.id?"עדכון":"הוספת משימה")+'</button>'
        + '</div>'
        + (overdue.length?'<div class="card" style="margin-bottom:12px;border-color:var(--danger)"><div class="section-title" style="color:var(--danger)">⚠️ משימות באיחור ('+overdue.length+')</div><div class="list">'
          + overdue.map(t=>'<div class="task-item overdue"><input type="checkbox" onchange="toggleTaskDone('+t.id+')" style="width:20px;flex:0"><div style="flex:1"><strong>'+escapeHtml(t.title)+'</strong><div class="small muted">'+escapeHtml(t.dueDate)+" | "+escapeHtml(t.assignedTo||"")+'</div></div><button class="btn-soft" style="width:auto;font-size:12px" onclick="editTask('+t.id+')">✏️</button><button class="btn-danger" style="width:auto;font-size:12px" onclick="deleteTask('+t.id+')">🗑</button></div>').join("")
          + '</div></div>':"")
        + '<div class="card"><div class="section-title">📋 משימות קרובות ('+upcoming.length+')</div><div class="list">'
        + (upcoming.length?upcoming.map(t=>'<div class="task-item"><input type="checkbox" onchange="toggleTaskDone('+t.id+')" style="width:20px;flex:0"><div style="flex:1"><strong>'+escapeHtml(t.title)+'</strong><div class="small muted">'+escapeHtml(t.dueDate)+" | "+escapeHtml(t.assignedTo||"")+" | עדיפות: "+escapeHtml(t.priority||"")+'</div></div><button class="btn-soft" style="width:auto;font-size:12px" onclick="editTask('+t.id+')">✏️</button><button class="btn-danger" style="width:auto;font-size:12px" onclick="deleteTask('+t.id+')">🗑</button></div>').join(""):'<div class="empty">אין משימות קרובות</div>')
        + '</div></div>'
        + (done.length?'<div class="card" style="margin-top:12px"><div class="section-title">✅ הושלמו ('+done.length+')</div><div class="list">'
          + done.slice(0,5).map(t=>'<div class="task-item done"><input type="checkbox" checked onchange="toggleTaskDone('+t.id+')" style="width:20px;flex:0"><div style="flex:1">'+escapeHtml(t.title)+'</div><button class="btn-danger" style="width:auto;font-size:12px" onclick="deleteTask('+t.id+')">🗑</button></div>').join("")
          + '</div></div>':"")
        + '</div></div>';
    }

              + '</div>'

              + '</div>';

          + (unassigned.length

      } else {
        html += '<div><div class="card"><div class="empty">בחר תיק טיול מהרשימה כדי לראות את המטיילים הרשומים</div></div></div>';
      }

      html += '</div>';
      return html;

        + (hotLeads.length?'<div class="section-title" style="font-size:16px;color:var(--warn);margin-top:12px">🎯 לידים חדשים ממתינים ('+hotLeads.length+')</div><div class="list">'+hotLeads.slice(0,5).map(l=>'<div class="item priority"><div class="item-head"><strong>'+escapeHtml(l.fullName)+'</strong><span class="badge b-warn">חדש</span></div><div class="small">'+escapeHtml(l.destinationInterest||"")+(l.budget?" | ₪"+l.budget:"")+'</div><div class="row" style="margin-top:6px;gap:4px"><button class="btn-wa" style="width:auto;font-size:12px" onclick="window.open(\'https://wa.me/'+escapeHtml(phoneForWa(l.phone))+'\',\'_blank\')">💬 WA</button><button class="btn-soft" style="width:auto;font-size:12px" onclick="editLead('+l.id+')">✏️</button></div></div>').join("")+'</div>':"")

    // ===== RENDER BROADCAST (Advanced Group Campaigns) =====
    function renderBroadcastTab() {
      var ch=S.campaignChannel||"whatsapp";
      var filtered=filterCampaignAudience();
      var recipientCount=getCampaignRecipientCount();
      var excluded=S.campaignExcluded||[];
      var segs=S.campaignSegments||[];
      var cats=S.campaignCategories||[];
      var regions=S.campaignRegions||[];
      var levels=S.campaignWalkingLevels||[];
      var hist=S.campaignHistory||[];

      html+='<div class="campaign-channel'+(ch==="email"?" active-channel":"")+'" onclick="setState({campaignChannel:\'email\'},false)" style="border-color:'+(ch==="email"?"#4A90D9":"#ddd")+'"><span style="font-size:22px">📧</span><span>אימייל</span></div>';
      html+='<div class="campaign-channel'+(ch==="sms"?" active-channel":"")+'" onclick="setState({campaignChannel:\'sms\'},false)" style="border-color:'+(ch==="sms"?"#FF9500":"#ddd")+'"><span style="font-size:22px">📱</span><span>SMS</span></div>';
      html+='</div></div>';

      // Audience Source
      html+='<div style="margin-top:12px"><label>מאגר קהל יעד</label>';
      html+='<select onchange="setState({campaignAudience:this.value,campaignExcluded:[]},false)">';
      html+='<option value="travelers"'+(S.campaignAudience==="travelers"?" selected":"")+'>👥 מטיילים</option>';
      html+='<option value="leads"'+(S.campaignAudience==="leads"?" selected":"")+'>🎯 לידים</option>';
      html+='<option value="contacts"'+(S.campaignAudience==="contacts"?" selected":"")+'>📇 אנשי קשר</option>';
      html+='<option value="hr"'+(S.campaignAudience==="hr"?" selected":"")+'>👔 כוח אדם</option>';
      html+='<option value="all"'+(S.campaignAudience==="all"?" selected":"")+'>🌐 כולם</option>';
      html+='</select></div>';
      html+='</div>';

      // Advanced Segmentation Card
      html+='<div class="card"><div class="section-title">🎯 סינונים וחיתוכים חכמים'+(activeFilterCount?' <span class="badge b-ok">'+activeFilterCount+' פילטרים פעילים</span>':'')+'</div>';

      // Segments
      html+='<div style="margin-top:8px"><label>סגמנטים / קבוצות עניין</label>';
      html+='<div class="chips" style="margin-top:4px">'+SEGMENTS.map(function(s){return '<span class="chip '+(segs.includes(s)?"active-chip":"")+'" onclick="toggleCampaignFilter(\'campaignSegments\',\''+escapeHtml(s)+'\')" style="cursor:pointer">'+escapeHtml(s)+'</span>';}).join("")+'</div></div>';

      // Trip Categories
      html+='<div style="margin-top:10px"><label>קטגוריית טיול מועדפת</label>';
      html+='<div class="chips" style="margin-top:4px">'+TRIP_CATEGORIES.map(function(c){return '<span class="chip '+(cats.includes(c)?"active-chip":"")+'" onclick="toggleCampaignFilter(\'campaignCategories\',\''+escapeHtml(c)+'\')" style="cursor:pointer">'+escapeHtml(c)+'</span>';}).join("")+'</div></div>';

      // Hiking Regions
      html+='<div style="margin-top:10px"><label>אזורי טיול מועדפים</label>';
      html+='<div class="chips" style="margin-top:4px">'+HIKING_REGIONS.map(function(r){return '<span class="chip '+(regions.includes(r)?"active-chip":"")+'" onclick="toggleCampaignFilter(\'campaignRegions\',\''+escapeHtml(r)+'\')" style="cursor:pointer">'+escapeHtml(r)+'</span>';}).join("")+'</div></div>';

      // Walking Levels
      html+='<div style="margin-top:10px"><label>רמת הליכה</label>';
      html+='<div class="chips" style="margin-top:4px">'+LEVELS.map(function(l){return '<span class="chip '+(levels.includes(l)?"active-chip":"")+'" onclick="toggleCampaignFilter(\'campaignWalkingLevels\',\''+escapeHtml(l)+'\')" style="cursor:pointer">'+escapeHtml(l)+'</span>';}).join("")+'</div></div>';

      // Age Range + City + Toggles
      html+='<div class="row" style="margin-top:10px">';
      html+='<div><label>גיל מינימום</label><input type="number" min="0" max="120" placeholder="למשל: 25" value="'+escapeHtml(S.campaignAgeMin||"")+'" oninput="setState({campaignAgeMin:this.value},false)"></div>';
      html+='<div><label>גיל מקסימום</label><input type="number" min="0" max="120" placeholder="למשל: 65" value="'+escapeHtml(S.campaignAgeMax||"")+'" oninput="setState({campaignAgeMax:this.value},false)"></div>';
      html+='<div><label>עיר</label><input placeholder="סנן לפי עיר..." value="'+escapeHtml(S.campaignCity||"")+'" oninput="setState({campaignCity:this.value},false)" list="city_list_campaign"><datalist id="city_list_campaign">'+ISRAEL_CITIES.map(function(c){return '<option value="'+escapeHtml(c)+'">';}).join("")+'</datalist></div>';
      html+='</div>';

      html+='<div class="row" style="margin-top:8px;gap:16px">';
      html+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" '+(S.campaignActiveOnly?"checked":"")+' onchange="setState({campaignActiveOnly:this.checked},false)"> פעילים בלבד</label>';
      html+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" '+(S.campaignReturningOnly?"checked":"")+' onchange="setState({campaignReturningOnly:this.checked},false)"> חוזרים בלבד</label>';
      html+='</div>';

      // Filter actions
      html+='<div class="row" style="margin-top:10px;gap:6px">';
      html+='<button class="btn-soft" onclick="clearCampaignFilters()" style="width:auto">🧹 נקה כל הסינונים</button>';
      html+='<span class="small muted" style="align-self:center">נמצאו <strong>'+filtered.length+'</strong> נמענים ('+recipientCount+' עם '+getChannelLabel(ch)+' תקין)</span>';
      html+='</div>';
      html+='</div>';

      html+='<div class="card"><div class="section-title">✏️ ניסוח הודעה</div>';

      html+='<div class="row" style="margin-top:10px">';
      html+='<button class="campaign-send-btn" style="background:'+(ch==="whatsapp"?"#25D366":ch==="email"?"#4A90D9":"#FF9500")+'" onclick="sendCampaign()">'+getChannelIcon(ch)+' שלח '+getChannelLabel(ch)+' ל-'+recipientCount+' נמענים</button>';
      html+='</div></div>';

      // Campaign History Card
      if(hist.length){
        html+='<div class="card"><div class="section-title">📜 היסטוריית שליחות</div>';
        html+='<div class="list" style="max-height:200px;overflow-y:auto">';

          html+='<div class="item"><div class="item-head"><strong>'+getChannelIcon(h.channel)+' '+getChannelLabel(h.channel)+'</strong><span class="badge b-ok">'+h.recipientCount+' נמענים</span></div>';
          html+='<div class="small muted">'+escapeHtml(new Date(h.sentAt).toLocaleString("he-IL"))+' | שלח: '+escapeHtml(h.sentBy||"")+'</div>';
          html+='<div class="small" style="margin-top:2px">'+escapeHtml((h.message||"").substring(0,80))+(h.message&&h.message.length>80?"...":"")+'</div></div>';
        });
        html+='</div></div>';
      }

      html+='</div>'; // end campaign-col-right

      // --- Right column: Recipients with Exclusion ---
      html+='<div class="campaign-col-left">';
      html+='<div class="card" style="position:sticky;top:10px"><div class="section-title">👥 רשימת נמענים ('+filtered.length+')'
        +(excluded.length?' <span class="badge b-danger">'+excluded.length+' מוחרגים</span>':'')+'</div>';
      html+='<div class="sub-title">סמנו ✓ להחרגת מטיילים מהשליחה</div>';

      // Bulk exclude/include
      html+='<div class="row" style="margin-bottom:8px;gap:6px">';
      html+='<button class="btn-soft" onclick="includeAllCampaign()" style="width:auto;font-size:12px">✅ כלול הכל</button>';
      html+='<button class="btn-soft" onclick="excludeAllCampaign()" style="width:auto;font-size:12px;color:var(--danger)">🚫 החרג הכל</button>';
      html+='</div>';

      // Recipients list with checkboxes
      html+='<div class="list campaign-recipients-list" style="max-height:520px;overflow-y:auto">';
      var displayRows=filtered.slice(0,60);
      displayRows.forEach(function(r){
        var isExcluded=excluded.includes(r.id);
        var contactInfo="";
        if(ch==="whatsapp") contactInfo=r.whatsapp||r.phone||"";
        else if(ch==="email") contactInfo=r.email||"";
        else if(ch==="sms") contactInfo=r.phone||"";
        var hasContact=!!contactInfo;
        html+='<div class="campaign-recipient'+(isExcluded?" excluded":"")+(hasContact?"":" no-contact")+'">';
        html+='<label class="campaign-exclude-cb" title="'+(isExcluded?"לחץ לשחרור החרגה":"לחץ להחרגה מהשליחה")+'">';
        html+='<input type="checkbox" '+(isExcluded?"checked":"")+' onchange="toggleCampaignExclude('+r.id+')">';
        html+='<span class="campaign-exclude-label">'+(isExcluded?"מוחרג":"")+'</span></label>';
        html+='<div class="campaign-recipient-info"><strong>'+escapeHtml(r.fullName||r.name||"ללא שם")+'</strong>';
        if((r.segments||[]).length) html+='<div class="chips" style="margin-top:2px;gap:2px">'+r.segments.slice(0,3).map(function(s){return '<span class="chip" style="font-size:10px">'+escapeHtml(s)+'</span>';}).join("")+'</div>';
        html+='<div class="small muted">'+(hasContact?escapeHtml(contactInfo):'<span style="color:var(--danger)">אין '+getChannelLabel(ch)+'</span>')+'</div>';
        html+='</div></div>';
      });
      if(filtered.length>60){
        html+='<div class="small muted" style="text-align:center;padding:10px">ועוד '+(filtered.length-60)+' נמענים נוספים...</div>';
      }
      if(!filtered.length){
        html+='<div class="empty">אין נמענים התואמים את הסינונים שנבחרו</div>';
      }
      html+='</div></div>';
      html+='</div>'; // end campaign-col-left

      html+='</div>'; // end campaign-layout
      return html;
    }

    // ===== RENDER REPORTS =====
    function renderReportsTab() {
      const totalLeads=S.leads.length;
      const closedLeads=S.leads.filter(l=>l.status==="נסגר").length;
      const lostLeads=S.leads.filter(l=>l.status==="אבוד").length;
      const conversion=totalLeads?Math.round(closedLeads/totalLeads*100):0;
      const revenue=S.trips.reduce((a,t)=>a+(t.enrolled||0)*(t.price||0),0);
      const bySource=LEAD_SOURCES.map(s=>({source:s,count:S.leads.filter(l=>l.source===s).length})).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
      const byStatus=LEAD_STATUSES.map(s=>({status:s,count:S.leads.filter(l=>l.status===s).length}));
      const bySegment=SEGMENTS.map(s=>({segment:s,count:S.travelers.filter(t=>(t.segments||[]).includes(s)).length}));
      return '<div class="layout-2">'
        + '<div class="card"><div class="section-title">📊 דוח מכירות</div>'
        + '<div class="list">'
        + '<div class="item"><div class="item-head"><strong>סה"כ לידים</strong><span class="badge b-ok">'+totalLeads+'</span></div></div>'
        + '<div class="item"><div class="item-head"><strong>נסגרו</strong><span class="badge b-ok">'+closedLeads+'</span></div></div>'
        + '<div class="item"><div class="item-head"><strong>אבדו</strong><span class="badge b-danger">'+lostLeads+'</span></div></div>'
        + '<div class="item"><div class="item-head"><strong>יחס המרה</strong><span class="badge b-ok">'+conversion+'%</span></div></div>'
        + '<div class="item"><div class="item-head"><strong>הכנסות מטיולים</strong><span class="badge b-ok">₪'+revenue.toLocaleString("he-IL")+'</span></div></div>'
        + '</div>'
        + '<div class="section-title" style="margin-top:14px">📍 לידים לפי מקור</div><div class="list">'
        + bySource.map(x=>'<div class="item"><div class="item-head"><strong>'+escapeHtml(x.source)+'</strong><span class="badge b-ok">'+x.count+'</span></div><div class="meter"><span style="width:'+Math.round(x.count/totalLeads*100)+'%"></span></div></div>').join("")
        + '</div></div>'
        + '<div>'
        + '<div class="card" style="margin-bottom:12px"><div class="section-title">📈 לידים לפי סטטוס</div><div class="list">'
        + byStatus.map(x=>'<div class="item"><div class="item-head"><strong>'+escapeHtml(x.status)+'</strong><span class="badge b-ok">'+x.count+'</span></div></div>').join("")
        + '</div></div>'
        + '<div class="card"><div class="section-title">👥 מטיילים לפי קבוצה</div><div class="list">'
        + bySegment.map(x=>'<div class="item"><div class="item-head"><strong>'+escapeHtml(x.segment)+'</strong><span class="badge b-ok">'+x.count+'</span></div></div>').join("")
        + '</div></div></div></div>';
    }

    // ===== RENDER MATCHING (לילה AI) =====
    function renderMatchingTab() {
      const trips=S.trips;
      // Lila AI Chat Interface
      const lilaChat='<div class="card"><div class="lila-chat-wrap">'
        + '<div class="lila-header"><div style="display:flex;align-items:center;justify-content:center;gap:10px"><span class="lila-avatar">🤖</span><div><h3>לילה (AI) – המוח של המערכת</h3><div class="lila-sub">GoTours Group | יודעת לענות על כל שאלה שיש במערכת – שאלו אותי!</div></div></div></div>'
        + '<div class="lila-messages" id="lila_messages">'
        + (S.lilaHistory||[]).map(m=>'<div class="lila-msg '+(m.role==="user"?"user":"bot")+'">'+escapeHtml(m.text)+'</div>').join("")
        + '</div>'
        + '<div class="lila-input-row"><input placeholder="כתבו הודעה ללילה..." value="'+escapeHtml(S.lilaInput||"")+'" oninput="S.lilaInput=this.value" onkeydown="if(event.key===\'Enter\'){sendLilaMessage()}"><button class="btn-purple" onclick="sendLilaMessage()">שלח</button></div>'
        + '</div></div>';

      // Keep existing matching engine below the chat
      const matching='<div class="card" style="margin-top:12px"><div class="section-title">🎯 מנוע התאמה חכם – מטיילים לטיולים</div>'
        + '<div class="sub-title">מנוע ההתאמה מנתח העדפות, תקציב, רמת הליכה ודרישות דתיות.</div>'
        + '<div class="list">'
        + S.travelers.slice(0,10).map(t=>{
          const matches=trips.filter(trip=>{
            if(t.walkingLevel==="מיטיבי לכת"&&trip.difficulty==="קל") return false;
            if(t.religiousNeeds&&!trip.religiousFriendly) return false;
            if(t.kashrutRequired&&!trip.kashrutAvailable) return false;
            if(t.budgetMax&&trip.price>t.budgetMax) return false;
            return true;
          });
          return '<div class="item"><div class="item-head"><strong>'+escapeHtml(t.fullName)+'</strong><span class="badge b-ok">'+matches.length+' התאמות</span></div>'
            + '<div class="small muted">'+escapeHtml(t.preferredCategory||"")+" | "+escapeHtml(t.walkingLevel||"")+(t.budgetMax?" | עד ₪"+t.budgetMax:"")+'</div>'
            + (matches.length?'<div class="chips" style="margin-top:6px">'+matches.map(m=>'<span class="chip">✈ '+escapeHtml(m.title)+'</span>').join("")+'</div>':"")
            + '</div>';
        }).join("")
        + '</div></div>';

      return lilaChat + '<div class="layout-2">'
        + matching
        + '<div class="card"><div class="section-title">📋 טיולים זמינים</div>'
        + '<div class="list">'+trips.map(t=>'<div class="item"><div class="item-head"><strong>'+escapeHtml(t.title)+'</strong><span class="badge b-ok">'+escapeHtml(t.destination)+'</span></div>'
          + '<div class="small">'+escapeHtml(t.difficulty||"")+" | ₪"+t.price+" | "+t.durationDays+" ימים"+(t.religiousFriendly?" | ✡ דתי":"")+(t.kashrutAvailable?" | 🥩 כשר":"")+'</div>'
          + '<div class="small muted">'+escapeHtml(t.enrolled||0)+"/"+escapeHtml(t.capacity||0)+" רשומים"+'</div>'
          + '</div>').join("")
        + '</div></div></div>';
    }

    // Signature pad initialization for internal use
    var _sigCanvas=null, _sigCtx=null, _sigDrawing=false;
    function initSignaturePad() {
      setTimeout(function(){
        _sigCanvas=document.getElementById("quote_sig_canvas");
        if(!_sigCanvas) return;
        _sigCtx=_sigCanvas.getContext("2d");
        _sigCtx.strokeStyle="#1a1a2e";
        _sigCtx.lineWidth=2;
        _sigCtx.lineCap="round";
        _sigDrawing=false;
        function getPos(e) {
          const r=_sigCanvas.getBoundingClientRect();
          const t=e.touches?e.touches[0]:e;
          return {x:t.clientX-r.left,y:t.clientY-r.top};
        }
        function startDraw(e) { e.preventDefault(); _sigDrawing=true; const p=getPos(e); _sigCtx.beginPath(); _sigCtx.moveTo(p.x,p.y); }
        function draw(e) { if(!_sigDrawing) return; e.preventDefault(); const p=getPos(e); _sigCtx.lineTo(p.x,p.y); _sigCtx.stroke(); }
        function stopDraw() { _sigDrawing=false; }
        _sigCanvas.addEventListener("mousedown",startDraw);
        _sigCanvas.addEventListener("mousemove",draw);
        _sigCanvas.addEventListener("mouseup",stopDraw);
        _sigCanvas.addEventListener("mouseleave",stopDraw);
        _sigCanvas.addEventListener("touchstart",startDraw,{passive:false});
        _sigCanvas.addEventListener("touchmove",draw,{passive:false});
        _sigCanvas.addEventListener("touchend",stopDraw);
      },100);
    }
    function clearSignaturePad() {
      if(_sigCtx && _sigCanvas) _sigCtx.clearRect(0,0,_sigCanvas.width,_sigCanvas.height);
    }
    function saveSignatureToQuote(quoteId) {
      if(!_sigCanvas) return alert("לא נמצא אזור חתימה");
      // Check if canvas has any drawing
      var pxData=_sigCtx.getImageData(0,0,_sigCanvas.width,_sigCanvas.height).data;
      var hasDraw=false;
      for(var p=3;p<pxData.length;p+=4){ if(pxData[p]>0){hasDraw=true;break;} }
      if(!hasDraw) return alert("אנא חתמו על הצעת המחיר לפני השמירה");
      var sigData=_sigCanvas.toDataURL("image/png");
      var i=S.quotes.findIndex(q=>q.id===quoteId);
      if(i<0) return;
      S.quotes[i].signature=sigData;
      S.quotes[i].signatureTimestamp=isoNow();
      S.quotes[i].signatureIP="פנימי (CRM)";
      S.quotes[i].signedAt=isoNow();
      S.quotes[i].status="נחתמה";
      setState({quotes:S.quotes});
      logActivity("הצעת מחיר נחתמה (פנימי)",S.quotes[i].clientName);
    }

      var formAddonsTot=addonsTotal(f.addons);
      var formGrand=formTotal+formAddonsTot;
      var syms={ILS:"₪",USD:"$",EUR:"€",GBP:"£"};
      var sym=syms[f.currency]||f.currency;

      var formHtml='<div class="card"><div class="section-title">📋 '+(f.id?"עריכת":"הוספת")+' הצעת מחיר (Proposal)</div>';

      // === Cover Image Section ===
      formHtml+='<div style="margin:8px 0;padding:10px;background:#f8fbff;border:1px solid var(--line);border-radius:10px">'
        +'<strong>תמונת נושא (Cover Image)</strong>'
        +'<div style="font-size:12px;color:var(--muted);margin:2px 0">תמונה ראשית שתופיע בראש ההצעה ללקוח</div>'
        +'<input type="file" accept="image/*" onchange="handleCoverImage(this)" style="margin:6px 0">'
        +(f.coverImage?'<img src="'+f.coverImage+'" class="proposal-cover-preview"><button class="btn-soft" style="width:auto;font-size:11px;margin:4px 0" onclick="S.quoteForm.coverImage=\'\';render()">הסר תמונה</button>':'')

      formHtml+='<div style="margin:8px 0">'+tip("פתיח שיווקי ללקוח","טקסט אישי שיופיע מתחת לתמונת הנושא – ניתן לכתוב הקדמה שיווקית")
        +'<textarea placeholder="שלום [שם לקוח],\nשמחים להציג לכם הצעה מיוחדת..." style="min-height:60px" oninput="S.quoteForm.introText=this.value">'+escapeHtml(f.introText||"")+'</textarea></div>';

      // === Client Details ===
      formHtml+='<div class="grid">'
        +'<div class="row"><div>'+tip("שם לקוח","שם מלא של הלקוח שמקבל את ההצעה")+'<input value="'+escapeHtml(f.clientName)+'" oninput="S.quoteForm.clientName=this.value"></div>'
        +'<div>'+tip("טלפון","מספר טלפון לשליחת ההצעה ב-WhatsApp")+'<input value="'+escapeHtml(f.clientPhone)+'" oninput="S.quoteForm.clientPhone=this.value"></div></div>'
        +'<div class="row"><div>'+tip("אימייל","כתובת דואר אלקטרוני לשליחת ההצעה")+'<input type="email" value="'+escapeHtml(f.clientEmail)+'" oninput="S.quoteForm.clientEmail=this.value"></div>'
        +'<div>'+tip("מטבע","מטבע ההצעה")+'<select onchange="S.quoteForm.currency=this.value;render()">'+["ILS","USD","EUR","GBP"].map(function(c){return '<option'+(c===f.currency?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div></div>'
        +'<div class="row"><div>'+tip("כותרת הצעה","שם הטיול או השירות המוצע")+'<input value="'+escapeHtml(f.tripTitle)+'" oninput="S.quoteForm.tripTitle=this.value"></div>'
        +'<div>'+tip("יעד","יעד הטיול")+'<input value="'+escapeHtml(f.destination)+'" oninput="S.quoteForm.destination=this.value"></div></div>'

      // === Itinerary Builder ===
      formHtml+='<div style="margin:12px 0;padding:10px;background:#f0f7ff;border:1px solid #c5ddf5;border-radius:10px">'

      f.itinerary.forEach(function(day,idx){

          +'<div class="itinerary-day-header"><span class="itinerary-day-num">'+(idx+1)+'</span>'

      if(f.addons.length) {
        formHtml+='<div style="font-size:13px;color:var(--ok);font-weight:700;margin:4px 0">סה"כ שדרוגים: '+sym+formAddonsTot.toLocaleString("he-IL")+'</div>';
      }
      formHtml+='</div>';

      formHtml+='<div style="font-weight:800;font-size:18px;color:var(--brand);margin:10px 0;padding:8px;background:#edf5fc;border-radius:8px;text-align:center">סה"כ כולל: '+sym+formGrand.toLocaleString("he-IL")+'</div>';

      // Cancellation policy - CEO only can edit
      if(isCeo) {
        formHtml+='<div>'+tip("מדיניות דמי ביטול","מדיניות ביטול שתוצג ללקוח בהצעה – רק המנכ\"ל יכול לערוך")+'<textarea placeholder="פרט את מדיניות דמי הביטול..." oninput="S.quoteForm.cancellationPolicy=this.value">'+escapeHtml(f.cancellationPolicy)+'</textarea></div>';
      } else {
        formHtml+='<div>'+tip("מדיניות דמי ביטול","ניתן לצפייה בלבד – רק המנכ\"ל יכול לערוך")+'<textarea disabled style="background:#f0f0f0;cursor:not-allowed">'+escapeHtml(f.cancellationPolicy)+'</textarea><div class="small muted">רק המנכ"ל יכול לערוך את מדיניות דמי הביטול</div></div>';
      }

      formHtml+='<div>'+tip("הערות","הערות נוספות להצעה")+'<textarea oninput="S.quoteForm.notes=this.value">'+escapeHtml(f.notes)+'</textarea></div>'

        +(f.id?'<button class="btn-soft" style="margin-top:4px" onclick="resetQuoteForm();render()">ביטול</button>':'')
        +'</div></div>';

      // Quote list
      var listHtml='<div class="card"><div class="section-title">📋 הצעות מחיר ('+list.length+')</div>'
