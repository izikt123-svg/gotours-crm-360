<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoTours - הצעת מחיר</title>
  <style>
    :root { --brand:#0f567f; --ok:#1f8a53; --warn:#b57814; --line:#d7e1eb; --text:#132133; --muted:#5e6f84; --accent:#2563eb; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; color:var(--text); font-family:"Assistant","Segoe UI",Arial,sans-serif; background:#f5f8fc; -webkit-font-smoothing:antialiased; }

    /* Cover Hero */
    .cover-hero { position:relative; width:100%; min-height:220px; background:linear-gradient(135deg,#0f567f 0%,#1a7ab5 50%,#2490d4 100%); overflow:hidden; }
    .cover-hero img { width:100%; height:280px; object-fit:cover; display:block; }
    .cover-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.55)); padding:20px 16px 16px; }
    .cover-logo { font-size:28px; font-weight:800; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .cover-sub { font-size:14px; color:rgba(255,255,255,0.85); margin-top:2px; }
    .no-cover-header { padding:28px 16px 18px; text-align:center; }
    .no-cover-header .cover-logo { font-size:30px; color:#fff; }

    /* Content wrapper */
    .wrap { max-width:680px; margin:0 auto; padding:0 12px 24px; }

    /* Cards */
    .card { background:#fff; border-radius:16px; box-shadow:0 4px 20px rgba(11,39,64,0.07); padding:20px; margin-top:16px; overflow:hidden; }
    .card-accent { border-top:4px solid var(--brand); }

    /* Intro text */
    .intro-text { font-size:15px; line-height:1.75; color:#374151; white-space:pre-wrap; padding:16px; background:linear-gradient(135deg,#eff6ff,#f8fbff); border-radius:12px; margin:12px 0; }

    /* Info grid */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; margin:12px 0; font-size:14px; }
    .info-grid strong { color:var(--brand); }
    .info-label { font-size:12px; color:var(--muted); }

    /* Section titles */
    .section-title { font-size:18px; font-weight:800; color:var(--brand); margin:16px 0 10px; display:flex; align-items:center; gap:8px; }

    /* Itinerary */
    .itin-timeline { position:relative; padding-right:20px; }
    .itin-timeline::before { content:''; position:absolute; right:11px; top:8px; bottom:8px; width:3px; background:linear-gradient(var(--brand),var(--accent)); border-radius:3px; }
    .itin-day { position:relative; margin:12px 0; padding:12px 14px; background:#f8fbff; border:1px solid #e0ecf7; border-radius:12px; transition:0.2s; }
    .itin-day:hover { box-shadow:0 4px 12px rgba(15,86,127,0.1); }
    .itin-dot { position:absolute; right:-20px; top:16px; width:20px; height:20px; background:var(--brand); border:3px solid #fff; border-radius:50%; box-shadow:0 0 0 2px var(--brand); }
    .itin-day-num { display:inline-block; background:var(--brand); color:#fff; border-radius:999px; padding:2px 10px; font-size:12px; font-weight:800; margin-bottom:4px; }
    .itin-day h3 { font-size:16px; color:var(--text); margin:4px 0; }
    .itin-day p { font-size:14px; color:#4b5563; line-height:1.65; white-space:pre-wrap; margin:6px 0; }
    .itin-day img { width:100%; border-radius:10px; margin-top:8px; max-height:180px; object-fit:cover; }

    /* Pricing table */
    .price-table { width:100%; border-collapse:collapse; font-size:14px; margin:10px 0; }
    .price-table th { background:var(--brand); color:#fff; padding:10px 12px; text-align:right; font-size:13px; }
    .price-table td { padding:10px 12px; border-bottom:1px solid #edf2f7; }
    .price-table tr:hover td { background:#f0f7ff; }
    .price-total td { font-weight:800; background:#edf5fc !important; font-size:15px; }

    /* Add-ons */
    .addons-card { background:linear-gradient(135deg,#f0fdf4,#ecfdf5); border:1px solid #a7f3d0; border-radius:14px; padding:16px; margin:16px 0; }
    .addon-item { display:flex; align-items:center; gap:10px; padding:10px; background:#fff; border:1px solid #d1fae5; border-radius:10px; margin:6px 0; transition:0.2s; cursor:pointer; }
    .addon-item:hover { box-shadow:0 2px 8px rgba(31,138,83,0.12); }
    .addon-item.checked { border-color:var(--ok); background:#f0fdf4; }
    .addon-check { width:22px; height:22px; border-radius:6px; border:2px solid #d1d5db; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.15s; font-size:14px; }
    .addon-item.checked .addon-check { background:var(--ok); border-color:var(--ok); color:#fff; }
    .addon-name { flex:1; font-weight:600; font-size:14px; }
    .addon-price { font-weight:800; color:var(--ok); font-size:15px; white-space:nowrap; }
    .grand-total-bar { background:linear-gradient(135deg,var(--brand),#1a7ab5); color:#fff; border-radius:12px; padding:16px; text-align:center; margin:16px 0; }
    .grand-total-bar .amount { font-size:28px; font-weight:800; }
    .grand-total-bar .label { font-size:14px; opacity:0.85; }

    /* Cancel box */
    .cancel-box { background:#fffbeb; border:1px solid #fde68a; border-radius:12px; padding:14px; margin:12px 0; }
    .cancel-box h3 { color:var(--warn); font-size:15px; margin-bottom:6px; }
    .cancel-box p { font-size:13px; line-height:1.6; }
    .notes-box { background:#f8fbff; border:1px solid var(--line); border-radius:10px; padding:12px; margin:8px 0; font-size:14px; line-height:1.6; }

    /* Signature */
    .sig-area { border:2px dashed var(--line); border-radius:14px; padding:20px; text-align:center; margin:16px 0; background:#fafcff; }
    .sig-area.signed { border-color:var(--ok); background:#f0fdf4; border-style:solid; }
    .sig-area canvas { border:1px solid var(--line); border-radius:10px; background:#fff; cursor:crosshair; display:block; margin:10px auto; touch-action:none; max-width:100%; }
    .sig-meta { font-size:12px; color:var(--muted); margin-top:8px; }
    .sig-label { font-size:16px; font-weight:700; color:var(--brand); margin-bottom:8px; }
    .sig-hint { font-size:13px; color:var(--muted); margin:4px 0 10px; }

    /* Buttons */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 28px; border:none; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .btn:active { transform:scale(0.97); }
    .btn-ok { background:var(--ok); color:#fff; box-shadow:0 4px 12px rgba(31,138,83,0.25); }
    .btn-ok:hover { background:#17784a; }
    .btn-soft { background:#f2f7fc; color:var(--brand); border:1px solid #d4e5f5; }
    .btn-soft:hover { background:#e2edf8; }
    .btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:12px 0; }

    /* Footer */
    .footer { text-align:center; font-size:12px; color:#9ca3af; margin-top:24px; padding:16px; }
    .footer a { color:var(--brand); text-decoration:none; }

    /* Loading / Error */
    .loading { text-align:center; padding:60px 20px; color:var(--muted); font-size:18px; }
    .error { text-align:center; padding:60px 20px; color:#dc2626; font-size:18px; }

    /* Responsive */
    @media(max-width:600px) {
      .cover-hero img { height:200px; }
      .card { padding:14px; border-radius:12px; margin-top:12px; }
      .info-grid { grid-template-columns:1fr; }
      .grand-total-bar .amount { font-size:24px; }
      .itin-timeline { padding-right:16px; }
      .itin-timeline::before { right:8px; }
      .itin-dot { right:-16px; width:16px; height:16px; }
      canvas { width:100% !important; height:auto !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">טוען הצעת מחיר...</div>
  </div>

  <script>
    var quoteId = new URLSearchParams(window.location.search).get("id");
    var app = document.getElementById("app");
    var quote = null;
    var sigCanvas, sigCtx, drawing = false;
    var selectedAddons = {};

    function escHtml(s) { return s == null ? "" : String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function fmtDate(v) { if(!v) return ""; try { return new Date(v).toLocaleDateString("he-IL"); } catch(e) { return String(v); } }

    function loadQuote() {
      if (!quoteId) { app.innerHTML = '<div class="error">קישור לא תקין – חסר מזהה הצעה</div>'; return; }
      fetch("/.netlify/functions/quote-public?id=" + encodeURIComponent(quoteId))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.ok || !data.quote) { app.innerHTML = '<div class="error">הצעת המחיר לא נמצאה</div>'; return; }
          quote = data.quote;
          // Initialize selected addons from saved state
          if (quote.selectedAddons) {
            selectedAddons = quote.selectedAddons;
          }
          renderQuote();
        })
        .catch(function() { app.innerHTML = '<div class="error">שגיאה בטעינת ההצעה. נסו שוב מאוחר יותר.</div>'; });
    }

    function calcBaseTotal() {
      return (quote.items||[]).reduce(function(s,it) { return s + (Number(it.qty)||0) * (Number(it.unitPrice)||0); }, 0);
    }

    function calcAddonsTotal() {
      var total = 0;
      (quote.addons||[]).forEach(function(a, i) {
        if (selectedAddons[i]) total += Number(a.price) || 0;
      });
      return total;
    }

    function toggleAddon(idx) {
      if (quote.signature) return; // Can't change after signing
      selectedAddons[idx] = !selectedAddons[idx];
      renderQuote();
    }

    function renderQuote() {
      var q = quote;
      var syms = {ILS:"₪",USD:"$",EUR:"€",GBP:"£"};
      var sym = syms[q.currency] || q.currency || "₪";
      var baseTotal = calcBaseTotal();
      var addonsTotal = calcAddonsTotal();
      var grandTotal = baseTotal + addonsTotal;

      var html = '';

      // === Cover Hero ===
      if (q.coverImage) {
        html += '<div class="cover-hero"><img src="' + q.coverImage + '" alt="' + escHtml(q.tripTitle) + '">'
          + '<div class="cover-overlay"><div class="cover-logo">GoTours</div>'
          + '<div class="cover-sub">הצעת מחיר מס׳ Q-' + q.id + '</div></div></div>';
      } else {
        html += '<div class="cover-hero no-cover-header"><div class="cover-logo">GoTours</div>'
          + '<div class="cover-sub">הצעת מחיר מס׳ Q-' + q.id + '</div></div>';
      }

      html += '<div class="wrap">';

      // === Trip Title Card ===
      html += '<div class="card card-accent">'
        + '<h1 style="font-size:22px;color:var(--brand);margin-bottom:4px">' + escHtml(q.tripTitle) + (q.destination ? ' – ' + escHtml(q.destination) : '') + '</h1>'
        + '<div style="font-size:13px;color:var(--muted)">הצעה עבור ' + escHtml(q.clientName) + ' | ' + fmtDate(q.createdAt) + '</div>';

      // Intro text
      if (q.introText) {
        html += '<div class="intro-text">' + escHtml(q.introText) + '</div>';
      }

      // Client & trip details
      html += '<div class="info-grid">'
        + '<div><div class="info-label">לקוח</div><strong>' + escHtml(q.clientName) + '</strong></div>'
        + '<div><div class="info-label">תאריך הצעה</div><strong>' + fmtDate(q.createdAt) + '</strong></div>'
        + (q.departureDate ? '<div><div class="info-label">תאריך יציאה</div><strong>' + escHtml(q.departureDate) + '</strong></div>' : '')
        + (q.returnDate ? '<div><div class="info-label">תאריך חזרה</div><strong>' + escHtml(q.returnDate) + '</strong></div>' : '')
        + '</div></div>';

      // === Itinerary ===
      if (q.itinerary && q.itinerary.length) {
        html += '<div class="card"><div class="section-title">תוכנית הטיול</div>'
          + '<div class="itin-timeline">';
        q.itinerary.forEach(function(day, i) {
          html += '<div class="itin-day"><div class="itin-dot"></div>'
            + '<div class="itin-day-num">יום ' + (i+1) + '</div>'
            + '<h3>' + escHtml(day.title || "יום " + (i+1)) + '</h3>'
            + (day.description ? '<p>' + escHtml(day.description) + '</p>' : '')
            + (day.image ? '<img src="' + day.image + '" alt="יום ' + (i+1) + '">' : '')
            + '</div>';
        });
        html += '</div></div>';
      }

      // === Pricing Table ===
      html += '<div class="card"><div class="section-title">פירוט תמחור</div>'
        + '<table class="price-table"><tr><th>פריט</th><th>כמות</th><th>מחיר יחידה</th><th>סה"כ</th></tr>'
        + (q.items||[]).map(function(it) {
            var t = (Number(it.qty)||0) * (Number(it.unitPrice)||0);
            return '<tr><td>' + escHtml(it.description) + '</td><td style="text-align:center">' + it.qty + '</td><td>' + sym + (Number(it.unitPrice)||0).toLocaleString("he-IL") + '</td><td><strong>' + sym + t.toLocaleString("he-IL") + '</strong></td></tr>';
          }).join("")
        + '<tr class="price-total"><td colspan="3">סה"כ בסיס</td><td>' + sym + baseTotal.toLocaleString("he-IL") + '</td></tr></table></div>';

      // === Optional Add-ons ===
      if (q.addons && q.addons.length) {
        var isSigned = !!q.signature;
        html += '<div class="addons-card"><div class="section-title" style="color:var(--ok)">שדרוגי רשות</div>'
          + '<div style="font-size:13px;color:var(--muted);margin-bottom:8px">' + (isSigned ? 'השדרוגים שנבחרו:' : 'סמנו את השדרוגים הרצויים – הסכום יתעדכן אוטומטית') + '</div>';
        q.addons.forEach(function(a, i) {
          var isChecked = !!selectedAddons[i];
          html += '<div class="addon-item' + (isChecked ? ' checked' : '') + '" onclick="toggleAddon(' + i + ')">'
            + '<div class="addon-check">' + (isChecked ? '✓' : '') + '</div>'
            + '<div class="addon-name">' + escHtml(a.name) + '</div>'
            + '<div class="addon-price">+' + sym + (Number(a.price)||0).toLocaleString("he-IL") + '</div></div>';
        });
        if (addonsTotal > 0) {
          html += '<div style="text-align:left;font-weight:700;margin-top:8px;font-size:14px;color:var(--ok)">שדרוגים נבחרים: ' + sym + addonsTotal.toLocaleString("he-IL") + '</div>';
        }
        html += '</div>';
      }

      // === Grand Total ===
      html += '<div class="grand-total-bar"><div class="label">סה"כ לתשלום</div><div class="amount">' + sym + grandTotal.toLocaleString("he-IL") + '</div></div>';

      // === Notes ===
      if (q.notes) {
        html += '<div class="notes-box"><strong>הערות:</strong> ' + escHtml(q.notes) + '</div>';
      }

      // === Cancellation Policy ===
      if (q.cancellationPolicy) {
        html += '<div class="cancel-box"><h3>מדיניות דמי ביטול</h3><p>' + escHtml(q.cancellationPolicy) + '</p></div>';
      }

      // === Signature ===
      if (q.signature) {
        html += '<div class="sig-area signed"><div class="sig-label">הצעה זו נחתמה ואושרה</div>'
          + '<img src="' + q.signature + '" style="max-width:300px;max-height:120px;margin:10px auto;display:block;border-radius:10px" alt="חתימה">'
          + '<div class="sig-meta">נחתם בתאריך: ' + fmtDate(q.signatureTimestamp) + '</div></div>';
      } else {
        html += '<div class="card" id="sig_section"><div class="sig-area">'
          + '<div class="sig-label">חתימת המזמין</div>'
          + '<div class="sig-hint">אנא חתמו כאן לאישור ההצעה</div>'
          + '<canvas id="sig_canvas" width="400" height="150"></canvas>'
          + '<div class="btns">'
          + '<button class="btn btn-soft" onclick="clearSig()">נקה חתימה</button>'
          + '<button class="btn btn-ok" onclick="submitSignature()">אשר וחתום</button>'
          + '</div>'
          + '<div id="sig_status" style="margin-top:8px"></div></div></div>';
      }

      // === Footer ===
      html += '<div class="footer">GoTours Group | <a href="https://tiyoolim.com">tiyoolim.com</a><br>הצעת מחיר זו תקפה ל-30 יום מתאריך הפקתה</div>';

      html += '</div>'; // close wrap

      app.innerHTML = html;

      if (!q.signature) {
        setTimeout(initSigPad, 50);
      }
    }

    function initSigPad() {
      sigCanvas = document.getElementById("sig_canvas");
      if (!sigCanvas) return;
      sigCtx = sigCanvas.getContext("2d");
      sigCtx.strokeStyle = "#1a1a2e";
      sigCtx.lineWidth = 2;
      sigCtx.lineCap = "round";

      function getPos(e) {
        var r = sigCanvas.getBoundingClientRect();
        var t = e.touches ? e.touches[0] : e;
        return { x: (t.clientX - r.left) * (sigCanvas.width / r.width), y: (t.clientY - r.top) * (sigCanvas.height / r.height) };
      }
      function start(e) { e.preventDefault(); drawing = true; var p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); }
      function move(e) { if (!drawing) return; e.preventDefault(); var p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); }
      function stop() { drawing = false; }

      sigCanvas.addEventListener("mousedown", start);
      sigCanvas.addEventListener("mousemove", move);
      sigCanvas.addEventListener("mouseup", stop);
      sigCanvas.addEventListener("mouseleave", stop);
      sigCanvas.addEventListener("touchstart", start, { passive: false });
      sigCanvas.addEventListener("touchmove", move, { passive: false });
      sigCanvas.addEventListener("touchend", stop);
    }

    function clearSig() {
      if (sigCtx && sigCanvas) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
    }

    function submitSignature() {
      if (!sigCanvas || !sigCtx) return;
      var px = sigCtx.getImageData(0, 0, sigCanvas.width, sigCanvas.height).data;
      var hasDraw = false;
      for (var i = 3; i < px.length; i += 4) { if (px[i] > 0) { hasDraw = true; break; } }
      if (!hasDraw) { alert("אנא חתמו על ההצעה לפני השליחה"); return; }

      var sigData = sigCanvas.toDataURL("image/png");
      var statusEl = document.getElementById("sig_status");
      if (statusEl) statusEl.innerHTML = '<div style="color:var(--brand);font-weight:700">שומר חתימה...</div>';

      fetch("/.netlify/functions/quote-public?id=" + encodeURIComponent(quoteId), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ signature: sigData, selectedAddons: selectedAddons })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            quote.signature = sigData;
            quote.signatureTimestamp = data.signedAt;
            quote.signatureIP = data.ip;
            quote.status = "נחתמה";
            quote.selectedAddons = selectedAddons;
            renderQuote();
          } else {
            if (statusEl) statusEl.innerHTML = '<div style="color:#dc2626">שגיאה: ' + escHtml(data.error) + '</div>';
          }
        })
        .catch(function() {
          if (statusEl) statusEl.innerHTML = '<div style="color:#dc2626">שגיאה בשמירת החתימה. נסו שוב.</div>';
        });
    }

    loadQuote();
  </script>
</body>
</html>
